<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SincroGestio</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#f4f6f8;--s:#fff;--s2:#f8f9fa;--bd:#e4e8ed;--bd2:#cdd3db;--tx:#0d1f35;--tx2:#4a5568;--tx3:#9aa5b4;--cy:#0090b8;--cy2:#00b4d8;--cby:#e6f6fb;--cbr:#b3e4f5;--co:#6b5dd3;--rd:#e53e3e;--am:#d97706;--gn:#16a34a;--sh:0 1px 4px rgba(0,0,0,.07);}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Inter,sans-serif;background:var(--bg);color:var(--tx);min-height:100vh}
.app{display:flex;flex-direction:column;min-height:100vh}
.hdr{background:linear-gradient(135deg,#0077b6 0%,#0096c7 40%,#00b4d8 70%,#023e8a 100%);height:110px;position:sticky;top:0;z-index:10;display:flex;flex-direction:column;justify-content:space-between;border-bottom:3px solid #48cae4}
.hdr-ov{position:absolute;inset:0;background:radial-gradient(ellipse at 20% 50%,rgba(72,202,228,.2) 0%,transparent 60%)}
.hdr-top{position:relative;z-index:1;display:flex;align-items:center;justify-content:space-between;padding:14px 1.5rem 0}
.logo{font-family:"Barlow Condensed",sans-serif;font-weight:800;font-size:22px;letter-spacing:2px;color:#fff}
.logo span{color:#ade8f4}
.hdr-r{display:flex;align-items:center;gap:10px}
.sync{width:7px;height:7px;border-radius:50%;background:#4ade80}
.sync-l{font-size:11px;color:rgba(255,255,255,.75)}
.nbtn{font-size:12px;font-weight:600;padding:6px 16px;border-radius:20px;background:rgba(255,255,255,.9);color:#0077b6;border:none;cursor:pointer}
.nbtn:hover{background:#fff}
.nav{position:relative;z-index:1;display:flex;padding:0 1.5rem;gap:2px}
.np{font-size:12px;font-weight:500;padding:7px 16px;border-radius:8px 8px 0 0;border:none;background:rgba(255,255,255,.18);color:rgba(255,255,255,.8);cursor:pointer;font-family:Inter,sans-serif}
.np:hover{background:rgba(255,255,255,.3)}
.np.on{background:#fff;color:var(--tx);font-weight:600}
.main{flex:1;padding:1.5rem;max-width:1400px;width:100%;margin:0 auto}
.pr{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin-bottom:1.25rem}
.pc{background:var(--s);border-radius:12px;border:1px solid var(--bd);padding:16px;position:relative;overflow:hidden;box-shadow:var(--sh)}
.pc::before{content:"";position:absolute;inset:0 auto 0 0;width:4px}
.pc-s::before{background:var(--cy2)}
.pc-c::before{background:var(--co)}
.pi{font-size:20px;margin-bottom:6px}
.pn{font-size:14px;font-weight:600}
.ps{font-size:11px;color:var(--tx3);margin-top:1px}
.pns{display:flex;gap:14px;margin-top:10px}
.pnu{font-size:11px;color:var(--tx2)}
.pnu strong{font-size:20px;font-weight:700;font-family:"Barlow Condensed",sans-serif;color:var(--tx);display:block;line-height:1.1}
.pb{height:3px;background:var(--bd);border-radius:2px;margin-top:10px;overflow:hidden}
.pbs{height:100%;background:linear-gradient(90deg,var(--cy),var(--cy2));transition:width .4s}
.pbc{height:100%;background:linear-gradient(90deg,var(--co),#a78bfa);transition:width .4s}
.sr{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:1.25rem}
.st{background:var(--s);border-radius:10px;border:1px solid var(--bd);padding:12px 16px;box-shadow:var(--sh)}
.sn{font-family:"Barlow Condensed",sans-serif;font-size:28px;font-weight:700;line-height:1}
.sl{font-size:11px;color:var(--tx3);margin-top:2px}
.fb{display:flex;gap:6px;margin-bottom:1rem;flex-wrap:wrap;align-items:center}
.fl{font-size:11px;color:var(--tx3);font-weight:500}
.fc{font-size:12px;padding:4px 12px;border-radius:20px;border:1px solid var(--bd);background:var(--s);color:var(--tx2);cursor:pointer;font-family:Inter,sans-serif}
.fc:hover{border-color:var(--cy2);color:var(--cy)}
.fc.on{background:var(--cby);color:var(--cy);border-color:var(--cbr);font-weight:500}
.bd{display:grid;grid-template-columns:repeat(auto-fit,minmax(215px,1fr));gap:12px}
.col{background:var(--s2);border-radius:12px;border:1px solid var(--bd);overflow:hidden;display:flex;flex-direction:column}
.ch{padding:10px 14px 9px;display:flex;align-items:center;justify-content:space-between;background:var(--s);border-bottom:1px solid var(--bd)}
.cl{font-family:"Barlow Condensed",sans-serif;font-size:13px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;display:flex;align-items:center;gap:7px}
.cd{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.cc{font-size:11px;background:var(--bg);border:1px solid var(--bd);border-radius:10px;padding:1px 8px;color:var(--tx2)}
.cp{height:2px;background:var(--bd)}
.cpf{height:100%;transition:width .3s}
.tl{padding:7px;display:flex;flex-direction:column;gap:5px;flex:1}
.ec{font-size:12px;color:var(--tx3);text-align:center;padding:20px;font-style:italic}
.az{padding:0 7px 7px}
.ab{width:100%;font-size:12px;padding:7px;border:1.5px dashed var(--bd);border-radius:10px;background:transparent;color:var(--tx3);cursor:pointer;font-family:Inter,sans-serif;transition:.15s;display:flex;align-items:center;justify-content:center;gap:4px}
.ab:hover{border-color:var(--cbr);color:var(--cy);background:var(--cby)}
.tc{background:var(--s);border:1px solid var(--bd);border-radius:9px;overflow:hidden;box-shadow:var(--sh);transition:border-color .15s}
.tc:hover{border-color:var(--bd2)}
.tc.urg{border-left:3px solid var(--rd)}
.ta{height:2px}
.tb{padding:10px 12px}
.tt{font-size:13px;font-weight:500;line-height:1.4;margin-bottom:4px}
.tn{font-size:11px;color:var(--tx2);line-height:1.4;margin-bottom:5px}
.tch{display:flex;gap:4px;flex-wrap:wrap;align-items:center;margin-bottom:7px}
.chip{font-size:10px;padding:2px 7px;border-radius:5px;font-weight:600}
.ca{background:#fffbeb;color:var(--am);border:1px solid #fde68a}
.cm{background:#eff6ff;color:#2563eb;border:1px solid #bfdbfe}
.cb{background:#f0fdf4;color:var(--gn);border:1px solid #bbf7d0}
.ch2{background:#fff5f5;color:var(--rd);border:1px solid #fecaca}
.ccat{font-size:10px;padding:2px 7px;border-radius:5px;font-weight:500}
.cdt{font-size:10px;color:var(--cy)}
.cck{font-size:10px;color:var(--tx3)}
.tf{display:flex;align-items:center;justify-content:space-between;gap:4px;flex-wrap:wrap}
.mb{display:flex;gap:3px;flex-wrap:wrap}
.mbt{font-size:10px;padding:2px 7px;border:1px solid var(--bd);border-radius:4px;background:transparent;color:var(--tx2);cursor:pointer;font-family:Inter,sans-serif;transition:.1s}
.mbt:hover{background:var(--cby);border-color:var(--cbr);color:var(--cy)}
.tc2{display:flex;gap:3px;align-items:center}
.ib{width:24px;height:24px;border:1px solid var(--bd);border-radius:5px;background:transparent;color:var(--tx2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px}
.ib:hover{background:var(--bg)}
.ib.dl:hover{background:#fff5f5;color:var(--rd);border-color:#fecaca}
.eb{font-size:10px;padding:3px 9px;border:1px solid var(--bd);border-radius:5px;background:transparent;color:var(--tx2);cursor:pointer;font-family:Inter,sans-serif;display:flex;align-items:center;gap:3px;white-space:nowrap}
.eb:hover{background:var(--bg)}
.eb.op{background:var(--cby);color:var(--cy);border-color:var(--cbr)}
.ar{display:inline-block;transition:transform .2s;font-size:8px}
.eb.op .ar{transform:rotate(180deg)}
.td{border-top:1px solid var(--bd);background:var(--s2)}
.dts{display:flex;background:var(--s);border-bottom:1px solid var(--bd);overflow-x:auto}
.dt{font-size:11px;padding:8px 12px;cursor:pointer;color:var(--tx2);border:none;background:transparent;border-bottom:2px solid transparent;font-family:Inter,sans-serif;white-space:nowrap}
.dt:hover{color:var(--tx)}
.dt.on{color:var(--cy);border-bottom-color:var(--cy);font-weight:600}
.dp{padding:12px;display:none}
.dp.on{display:block}
.dl2{font-size:10px;font-weight:600;color:var(--tx3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px}
.dta{width:100%;font-family:Inter,sans-serif;font-size:12px;padding:8px 10px;border:1px solid var(--bd);border-radius:10px;background:var(--s);color:var(--tx);resize:vertical;min-height:80px;line-height:1.6;outline:none}
.dta:focus{border-color:var(--cy2)}
.sbtn{font-size:11px;padding:5px 14px;border-radius:7px;background:var(--cy);color:#fff;border:none;cursor:pointer;margin-top:7px;font-family:Inter,sans-serif;font-weight:600}
.sbtn:hover{background:var(--cy2)}
.cli{display:flex;align-items:center;gap:7px;padding:5px 0;border-bottom:1px solid var(--bd)}
.cli:last-child{border:none}
.cli input[type=checkbox]{width:14px;height:14px;cursor:pointer;accent-color:var(--cy)}
.clit{font-size:12px;color:var(--tx);flex:1}
.clit.dn{text-decoration:line-through;color:var(--tx3)}
.clid{font-size:10px;color:var(--tx3);cursor:pointer;padding:0 3px;opacity:0;background:none;border:none}
.cli:hover .clid{opacity:1}
.clid:hover{color:var(--rd)}
.ar2{display:flex;gap:6px;margin-top:8px}
.ai{flex:1;font-family:Inter,sans-serif;font-size:12px;padding:6px 10px;border:1px solid var(--bd);border-radius:7px;background:var(--s);color:var(--tx);outline:none}
.ai:focus{border-color:var(--cy2)}
.ab2{font-size:11px;padding:6px 12px;border:1px solid var(--bd);border-radius:7px;background:var(--s);color:var(--tx2);cursor:pointer;font-family:Inter,sans-serif;white-space:nowrap}
.ab2:hover{background:var(--cby);border-color:var(--cbr);color:var(--cy)}
.ii{width:100%;font-family:Inter,sans-serif;font-size:12px;padding:6px 10px;border:1px solid var(--bd);border-radius:7px;background:var(--s);color:var(--tx);outline:none;margin-bottom:10px}
.ii:focus{border-color:var(--cy2)}
.li{display:flex;align-items:center;gap:6px;padding:5px 0;border-bottom:1px solid var(--bd);font-size:12px}
.li:last-child{border:none}
.li a{color:var(--cy);text-decoration:none;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.li a:hover{text-decoration:underline}
.ld{font-size:10px;color:var(--tx3);cursor:pointer;opacity:0;background:none;border:none}
.li:hover .ld{opacity:1}
.vi{background:var(--s2);border:1px solid var(--bd);border-radius:10px;padding:9px 11px;margin-bottom:6px;display:flex;gap:9px}
.vim{flex:1}
.vn{font-size:12px;font-weight:500}
.vm{display:flex;gap:8px;margin-top:3px;flex-wrap:wrap;align-items:center}
.vp{font-size:12px;color:var(--gn);font-weight:600}
.vs{font-size:10px;padding:1px 6px;border-radius:4px;font-weight:600}
.vs-disponible{background:#f0fdf4;color:var(--gn)}
.vs-reservado{background:#fffbeb;color:var(--am)}
.vs-vendido{background:var(--bd);color:var(--tx3)}
.vno{font-size:11px;color:var(--tx2);margin-top:2px}
.vd{font-size:10px;color:var(--tx3);cursor:pointer;opacity:0;background:none;border:none;padding:2px}
.vi:hover .vd{opacity:1}
.vd:hover{color:var(--rd)}
.vt{font-size:13px;font-weight:700;color:var(--gn);padding:8px 12px;background:#f0fdf4;border-radius:8px;border:1px solid #bbf7d0;margin-bottom:9px}
.vaf{background:var(--s);border:1px solid var(--bd);border-radius:8px;padding:10px;margin-top:8px}
.vr{display:flex;gap:6px;margin-bottom:6px;flex-wrap:wrap}
.vai{flex:1;min-width:90px;font-family:Inter,sans-serif;font-size:12px;padding:6px 9px;border:1px solid var(--bd);border-radius:7px;background:var(--bg);color:var(--tx);outline:none}
.vai:focus{border-color:var(--cy2)}
.vss{font-family:Inter,sans-serif;font-size:10px;padding:2px 5px;border:1px solid var(--bd);border-radius:4px;background:var(--s);cursor:pointer}
/* CAL */
.cly{display:grid;grid-template-columns:1fr 260px;gap:14px;align-items:start}
.clh{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem}
.clt{font-family:"Barlow Condensed",sans-serif;font-size:22px;font-weight:700;letter-spacing:.5px;text-transform:uppercase}
.cln{display:flex;gap:6px}
.clb{height:32px;padding:0 12px;border:1px solid var(--bd);border-radius:8px;background:var(--s);color:var(--tx2);cursor:pointer;font-size:12px;font-family:Inter,sans-serif}
.clb:hover{background:var(--cby);border-color:var(--cbr);color:var(--cy)}
.cg{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:1rem}
.cdl{text-align:center;font-size:10px;font-weight:600;color:var(--tx3);letter-spacing:.8px;text-transform:uppercase;padding:5px 0}
.cda{min-height:70px;background:var(--s);border:1px solid var(--bd);border-radius:7px;padding:5px;cursor:pointer;transition:.15s}
.cda:hover{border-color:var(--cbr);background:var(--cby)}
.cda.td2{border-color:var(--cy2);background:var(--cby)}
.cda.om{opacity:.4;background:var(--s2)}
.cda.sel{border-color:var(--cy);background:var(--cby)}
.cdn{font-size:11px;font-weight:600;color:var(--tx);margin-bottom:3px}
.cda.td2 .cdn{color:var(--cy);font-weight:700}
.cdw{display:flex;flex-direction:column;gap:2px}
.cdd{font-size:9px;padding:1px 4px;border-radius:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;line-height:1.4}
.cag{background:var(--s);border:1px solid var(--bd);border-radius:12px;padding:14px}
.cat{font-family:"Barlow Condensed",sans-serif;font-size:15px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;margin-bottom:10px}
.cai{display:flex;align-items:flex-start;gap:8px;padding:7px 0;border-bottom:1px solid var(--bd)}
.cai:last-child{border:none}
.cad{font-size:11px;color:var(--cy);font-weight:600;min-width:44px;margin-top:1px}
.cax{font-size:12px;color:var(--tx);flex:1;line-height:1.4}
.cak{font-size:10px;padding:1px 6px;border-radius:4px;margin-top:3px;display:inline-block;font-weight:500}
.cae{font-size:12px;color:var(--tx3);text-align:center;padding:14px;font-style:italic}
.dic{background:var(--s);border:1px solid var(--bd);border-radius:12px;padding:14px;box-shadow:var(--sh);margin-bottom:10px}
.dit{font-family:"Barlow Condensed",sans-serif;font-size:15px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;margin-bottom:10px}
.dii{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--bd)}
.dii:last-child{border:none}
.dico{width:3px;height:32px;border-radius:2px;flex-shrink:0}
.dim{flex:1}
.din{font-size:12px;font-weight:500;line-height:1.3}
.did{font-size:10px;color:var(--cy);font-weight:600;margin-top:1px}
.didd{font-size:10px;color:var(--tx3);cursor:pointer;opacity:0;background:none;border:none;padding:2px}
.dii:hover .didd{opacity:1}
.didd:hover{color:var(--rd)}
.dic2{font-size:10px;font-weight:600;padding:2px 7px;border-radius:10px;white-space:nowrap}
.dic2.pr{background:#fef3c7;color:#92400e}
.dic2.ll{background:#f0fdf4;color:var(--gn)}
.dic2.pa{background:var(--bd);color:var(--tx3)}
.daf{margin-top:10px;padding-top:10px;border-top:1px solid var(--bd)}
.dai{width:100%;font-family:Inter,sans-serif;font-size:12px;padding:6px 9px;border:1px solid var(--bd);border-radius:7px;background:var(--bg);color:var(--tx);outline:none;margin-bottom:6px}
.dai:focus{border-color:var(--cy2)}
.dr{display:flex;gap:6px;margin-bottom:6px}
.dab{width:100%;font-size:11px;padding:7px;border-radius:7px;background:var(--cy);color:#fff;border:none;cursor:pointer;font-family:Inter,sans-serif;font-weight:600}
.dab:hover{background:var(--cy2)}
.dcs{flex:1;font-family:Inter,sans-serif;font-size:11px;padding:6px 8px;border:1px solid var(--bd);border-radius:7px;background:var(--bg);color:var(--tx);outline:none}
/* VENDER */
.vsr{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:1.25rem}
.vv{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:12px}
.vvc{background:var(--s);border:1px solid var(--bd);border-radius:12px;overflow:hidden}
.vvh{padding:12px 16px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between}
.vvt{font-family:"Barlow Condensed",sans-serif;font-size:15px;font-weight:700;letter-spacing:.5px;text-transform:uppercase}
.vvc2{font-size:11px;background:var(--bg);border:1px solid var(--bd);border-radius:10px;padding:1px 7px;color:var(--tx2)}
.vvb{padding:10px}
.vca{padding:9px 10px;background:var(--s2);border:1px solid var(--bd);border-radius:10px;margin-bottom:6px}
.vcn{font-size:12px;font-weight:500}
.vcp{font-size:14px;font-weight:700;font-family:"Barlow Condensed",sans-serif;margin-top:2px}
.vcf{font-size:10px;color:var(--tx3);margin-top:3px}
.vcno{font-size:11px;color:var(--tx2);margin-top:2px}
/* MODAL */
.mo{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:100;backdrop-filter:blur(4px)}
.md{background:var(--s);border-radius:14px;border:1px solid var(--bd);padding:1.5rem;width:min(430px,94vw);box-shadow:0 4px 16px rgba(0,0,0,.1)}
.mdt{font-family:"Barlow Condensed",sans-serif;font-size:20px;font-weight:700;margin-bottom:1.1rem}
.fi{margin-bottom:10px}
.fi label{font-size:11px;font-weight:600;color:var(--tx2);display:block;margin-bottom:4px;text-transform:uppercase;letter-spacing:.3px}
.fi input,.fi textarea,.fi select{width:100%;font-family:Inter,sans-serif;font-size:13px;padding:8px 11px;border:1px solid var(--bd);border-radius:10px;background:var(--bg);color:var(--tx);outline:none}
.fi input:focus,.fi textarea:focus,.fi select:focus{border-color:var(--cy2);background:var(--s)}
.fi textarea{height:66px;resize:vertical;line-height:1.5}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.ma{display:flex;justify-content:flex-end;gap:8px;margin-top:1.1rem}
.bs{padding:8px 16px;border:1px solid var(--bd);border-radius:10px;background:transparent;color:var(--tx2);cursor:pointer;font-size:13px;font-family:Inter,sans-serif}
.bs:hover{background:var(--bg)}
.bp{padding:8px 18px;border:none;border-radius:10px;background:var(--cy);color:#fff;cursor:pointer;font-size:13px;font-family:Inter,sans-serif;font-weight:700}
.bp:hover{background:var(--cy2)}
.rmb{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(4px)}
.rmd{background:var(--s);border-radius:14px;border:1px solid var(--bd);padding:1.5rem;width:min(380px,94vw);box-shadow:0 4px 16px rgba(0,0,0,.1)}
.rmd h3{font-family:"Barlow Condensed",sans-serif;font-size:20px;font-weight:700;margin-bottom:1rem}
.rit{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--bd);font-size:12px}
.rit:last-child{border:none}
.rid{background:none;border:none;color:var(--tx3);cursor:pointer;font-size:11px;margin-left:auto}
.rid:hover{color:var(--rd)}
.rar{display:flex;gap:6px;margin-top:8px}
.rai{flex:1;font-family:Inter,sans-serif;font-size:12px;padding:7px 10px;border:1px solid var(--bd);border-radius:8px;background:var(--bg);color:var(--tx);outline:none}
.rai:focus{border-color:var(--cy2)}
.rab{font-size:11px;padding:7px 12px;border-radius:8px;background:var(--cy);color:#fff;border:none;cursor:pointer;font-family:Inter,sans-serif;font-weight:600}
.rab:hover{background:var(--cy2)}
.rcb{width:100%;margin-top:10px;font-size:12px;padding:7px;border:1px solid var(--bd);border-radius:8px;background:transparent;color:var(--tx2);cursor:pointer;font-family:Inter,sans-serif}
.rcb:hover{background:var(--bg)}
.toast{position:fixed;bottom:24px;right:24px;background:var(--tx);color:#fff;font-size:12px;font-weight:500;padding:10px 18px;border-radius:10px;z-index:300;opacity:0;transition:opacity .2s;pointer-events:none}
.toast.show{opacity:1}

", "title": "Buscar local a Sant Cugat", "cat": "cowork", "prio": "alta", "col": "revision", "note": "", "hoy": "", "detail": "", "checklist": [], "fecha": "", "links": [], "vender": []}, {"id": "s6", "title": "Redactar proposta a inversors", "cat": "cowork", "prio": "media", "col": "pendiente", "note": "", "hoy": "", "detail": "", "checklist": [], "fecha": "", "links": [], "vender": []}, {"id": "s7", "title": "Pagar seguro piso", "cat": "gastos", "prio": "alta", "col": "pendiente", "note": "Vence el 15", "hoy": "", "detail": "", "checklist": [], "fecha": "", "links": [], "vender": []}, {"id": "s8", "title": "Revisio fontaneria cuina", "cat": "casa", "prio": "media", "col": "pendiente", "note": "", "hoy": "", "detail": "", "checklist": [], "fecha": "", "links": [], "vender": []}];
var DI0=[{"id": "di1", "name": "Exhibicio final de curs", "date": "2027-06-13", "color": "#0090b8"}, {"id": "di2", "name": "Jornada Porta un amic", "date": "2026-10-01", "color": "#16a34a"}, {"id": "di3", "name": "Inici temporada 2026-27", "date": "2026-09-15", "color": "#d97706"}];
var tasks=[],editId=null,addCol=null,fcat="all",od={},ot={},view="board";

function save(){try{localStorage.setItem("sg_t",JSON.stringify(tasks));}catch(e){}}
function saveDI(){try{localStorage.setItem("sg_di",JSON.stringify(cDI));}catch(e){}}

function load(){
  try{var t=localStorage.getItem("sg_t");if(t)tasks=JSON.parse(t);}catch(e){}
  if(!tasks.length){tasks=SEED.map(function(x){return Object.assign({},x,{checklist:(x.checklist||[]).map(function(c){return Object.assign({},c);})});});}
  try{var d=localStorage.getItem("sg_di");if(d)cDI=JSON.parse(d);}catch(e){}
  if(!cDI.length){cDI=DI0.slice();}
  try{var r=localStorage.getItem("sg_r");if(r)cRem=JSON.parse(r);}catch(e){}
  document.getElementById("sd").style.background="#4ade80";
  document.getElementById("sl").textContent="Llist";
  render();
}

function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function esc(s){if(!s)return"";return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function fil(){return fcat==="all"?tasks:tasks.filter(function(t){return t.cat===fcat;});}
function toast(m){var t=document.getElementById("toast");t.textContent=m;t.className="toast show";setTimeout(function(){t.className="toast";},2000);}

function render(){
  document.getElementById("nav").innerHTML=[["board","Tasques"],["calendar","Calendari"],["vender","Vendre"]].map(function(p){return'<button class="np'+(view===p[0]?" on":"")+'" onclick="sv(''+p[0]+'')">'+p[1]+"</button>";}).join("");
  if(view==="board")rBoard();
  else if(view==="calendar")rCal();
  else rVend();
}

function rBoard(){
  var v=fil();
  var dn=v.filter(function(t){return t.col==="hecho";}).length;
  var al=v.filter(function(t){return t.prio==="alta"&&t.col!=="hecho";}).length;
  var ho=v.filter(function(t){return t.hoy==="1"&&t.col!=="hecho";}).length;
  var cu=v.filter(function(t){return t.col==="en-curso";}).length;
  var h='<div class="pr">';
  [{id:"sincro",n:"Sincronitzada",s:"15 anys d historia",cl:"pc-s"},{id:"cowork",n:"Coworking",s:"Projecte nou",cl:"pc-c"}].forEach(function(p){
    var pt=tasks.filter(function(t){return t.cat===p.id;});
    var pd=pt.filter(function(t){return t.col==="hecho";}).length;
    var pp=pt.length?Math.round(pd/pt.length*100):0;
    var c=CATS[p.id];
    h+='<div class="pc '+p.cl+'"><div class="pi">'+c.i+'</div><div class="pn">'+p.n+'</div><div class="ps">'+p.s+'</div><div class="pns"><div class="pnu"><strong>'+pt.length+'</strong>tasques</div><div class="pnu"><strong>'+pd+'</strong>fetes</div></div><div class="pb"><div class="pb'+(p.id==="sincro"?"s":"c")+'" style="width:'+pp+'%"></div></div></div>';
  });
  h+='</div><div class="sr"><div class="st"><div class="sn">'+v.length+'</div><div class="sl">Total</div></div><div class="st"><div class="sn" style="color:#3b82f6">'+cu+'</div><div class="sl">En curs</div></div><div class="st"><div class="sn" style="color:#e53e3e">'+ho+'</div><div class="sl">Avui</div></div><div class="st"><div class="sn" style="color:#16a34a">'+dn+'</div><div class="sl">Fetes</div></div></div>';
  h+='<div class="fb"><span class="fl">Filtrar:</span>'+[["all","Totes"],["sincro","Sincro"],["cowork","Cowork"],["casa","Casa"],["gastos","Gastos"],["personal","Personal"],["viajes","Viajes"]].map(function(p){return'<button class="fc'+(fcat===p[0]?" on":"")+'" onclick="sf(''+p[0]+'')">'+p[1]+"</button>";}).join("")+"</div>";
  h+='<div class="bd">'+COLS.map(function(col){
    var ct=v.filter(function(t){return t.col===col.id;});
    var pp=v.length?Math.round(ct.length/v.length*100):0;
    return'<div class="col"><div class="ch"><span class="cl"><span class="cd" style="background:'+col.d+'"></span>'+col.l+'</span><span class="cc">'+ct.length+'</span></div><div class="cp"><div class="cpf" style="width:'+pp+'%;background:'+col.d+'"></div></div><div class="tl">'+(ct.length?ct.map(rT).join(""):'<div class="ec">Sense tasques</div>')+'</div><div class="az"><button class="ab" onclick="openM(null,''+col.id+'')">+ Afegir</button></div></div>';
  }).join("")+"</div>";
  document.getElementById("root").innerHTML=h;

function rT(t){
  var c=CATS[t.cat]||CATS.personal;
  var cl=t.checklist||[];var cd=cl.filter(function(i){return i.done;}).length;
  var io=!!od[t.id];var tb=ot[t.id]||"n";
  var mv=COLS.filter(function(cc){return cc.id!==t.col;}).map(function(cc){return'<button class="mbt" onclick="mv(''+t.id+'',''+cc.id+'')">'+cc.l+"</button>";}).join("");
  return'<div class="tc'+(t.hoy==="1"?" urg":"")+'"><div class="ta" style="background:'+c.c+';opacity:.5"></div><div class="tb"><div class="tt">'+esc(t.title)+'</div>'+(t.note?'<div class="tn">'+esc(t.note)+"</div>":"")+'<div class="tch"><span class="chip c'+t.prio.charAt(0)+'">'+t.prio+"</span>"+'<span class="ccat" style="background:'+c.b+";color:"+c.c+'">'+c.i+" "+c.l+"</span>"+(t.hoy==="1"?'<span class="chip ch2">avui</span>':"")+(t.fecha?'<span class="cdt">'+esc(t.fecha)+"</span>":"")+(cl.length?'<span class="cck">'+cd+"/"+cl.length+" ✓</span>":"")+'</div><div class="tf"><div class="mb">'+mv+'</div><div class="tc2"><button class="ib" onclick="eT(''+t.id+'')">✏️</button><button class="ib dl" onclick="dT(''+t.id+'')">🗑</button><button class="eb'+(io?" op":"")+'" onclick="tD(''+t.id+'')">'+( io?"Tancar":"Mes info")+' <span class="ar">▼</span></button></div></div></div>'+(io?rD(t,tb):"")+"</div>";
}

function rD(t,tab){
  var cl=t.checklist||[];var cd=cl.filter(function(i){return i.done;}).length;
  var vl=t.vender||[];var vt=vl.filter(function(v){return v.state==="vendido";}).reduce(function(a,v){return a+(parseFloat(v.price)||0);},0);
  var tabs=[["n","Notes"],["c","Checklist"+(cl.length?" ("+cd+"/"+cl.length+")":"")],["i","Info"],["v","Vendre"+(vl.length?" ("+vl.length+")":"")]];
  var h='<div class="td"><div class="dts">'+tabs.map(function(p){return'<button class="dt'+(tab===p[0]?" on":"")+'" onclick="st(''+t.id+'',''+p[0]+'')">'+p[1]+"</button>";}).join("")+"</div>";
  h+='<div class="dp'+(tab==="n"?" on":"")+'"><div class="dl2">Notes</div><textarea class="dta" id="dx-'+t.id+'">'+esc(t.detail||"")+'</textarea><button class="sbtn" onclick="sd2(''+t.id+'')">Guardar</button></div>';
  h+='<div class="dp'+(tab==="c"?" on":"")+'">'+( cl.length?cl.map(function(item,i){return'<div class="cli"><input type="checkbox"'+(item.done?" checked":"")+" onchange="tc2('"+t.id+"',"+i+")"><span class="clit"+(item.done?" dn":"")+"">"+esc(item.text)+'</span><button class="clid" onclick="dc(''+t.id+"',"+i+')">✕</button></div>';}).join(""):'<div style="font-size:12px;color:#9aa5b4;padding:6px 0">Sense passos</div>')+'<div class="ar2"><input class="ai" id="ci-'+t.id+'" placeholder="Nou pas..." onkeydown="if(event.key==='Enter')ac(''+t.id+'')"><button class="ab2" onclick="ac(''+t.id+'')">+ Afegir</button></div></div>';
  h+='<div class="dp'+(tab==="i"?" on":"")+'"><input class="ii" type="date" id="dx2-'+t.id+'" value="'+esc(t.fecha||"")+'" placeholder="Data limit"><div class="ar2"><input class="ai" id="li-'+t.id+'" placeholder="https://..."><button class="ab2" onclick="al2(''+t.id+'')">+ Link</button></div>'+((t.links&&t.links.length)?t.links.map(function(l,i){return'<div class="li"><a href="'+esc(l)+'" target="_blank">'+esc(l)+'</a><button class="ld" onclick="dl2(''+t.id+"',"+i+')">✕</button></div>';}).join(""):"")+'<button class="sbtn" onclick="sm2(''+t.id+'')">Guardar</button></div>';
  h+='<div class="dp'+(tab==="v"?" on":"")+'">'+( vl.length?'<div class="vt">Venut: '+vt.toFixed(2)+" €</div>":"")+vl.map(function(v,i){return'<div class="vi"><div class="vim"><div class="vn">'+esc(v.name)+'</div><div class="vm">'+(v.price?'<span class="vp">'+parseFloat(v.price).toFixed(2)+" €</span>":"")+'<span class="vs vs-'+v.state+'">'+v.state+"</span></div>"+(v.note?'<div class="vno">'+esc(v.note)+"</div>":"")+'</div><div style="display:flex;flex-direction:column;gap:4px;align-items:flex-end"><select class="vss" onchange="cvs(''+t.id+"',"+i+",this.value)">"+["disponible","reservado","vendido"].map(function(s){return"<option"+(v.state===s?" selected":"")+">"+s+"</option>";}).join("")+'</select><button class="vd" onclick="dv(''+t.id+"',"+i+')">✕</button></div></div>';}).join("")+'<div class="vaf"><div class="vr"><input class="vai" id="vn2-'+t.id+'" placeholder="Nom"><input class="vai" id="vp2-'+t.id+'" placeholder="Preu" type="number" style="max-width:80px"></div><input class="vai" id="vno2-'+t.id+'" placeholder="Nota..." style="width:100%;margin-bottom:7px"><button class="sbtn" onclick="av2(''+t.id+'')">+ Afegir</button></div></div>';
  h+="</div>";return h;
}

function rCal(){
  var MN=["Gener","Febrer","Marc","Abril","Maig","Juny","Juliol","Agost","Setembre","Octubre","Novembre","Desembre"];
  var DN=["Dl","Dt","Dc","Dj","Dv","Ds","Dg"];
  var today=new Date();var y=cY,m=cM;
  var first=new Date(y,m,1);var last=new Date(y,m+1,0);
  var off=first.getDay();off=(off===0)?6:off-1;
  var cells=[];
  for(var i=0;i<off;i++){cells.push({d:new Date(y,m,1-off+i),cur:false});}
  for(var i=1;i<=last.getDate();i++){cells.push({d:new Date(y,m,i),cur:true});}
  while(cells.length%7!==0){var ld=cells[cells.length-1].d;var nd=new Date(ld);nd.setDate(nd.getDate()+1);cells.push({d:nd,cur:false});}
  function dk(d){return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}
  var tbd={};tasks.forEach(function(t){if(t.fecha){if(!tbd[t.fecha])tbd[t.fecha]=[];tbd[t.fecha].push(t);}});
  var dbd={};cDI.forEach(function(di){if(di.date){if(!dbd[di.date])dbd[di.date]=[];dbd[di.date].push(di);}});
  var tk=dk(today);var sk=cSel?dk(cSel):null;
  var grid='<div class="cg">'+DN.map(function(d){return'<div class="cdl">'+d+"</div>";}).join("");
  cells.forEach(function(cell){
    var k=dk(cell.d);
    var cls="cda"+(cell.cur?"":"-om")+(k===tk?" td2":"")+(k===sk?" sel":"");
    if(!cell.cur)cls="cda om"+(k===tk?" td2":"")+(k===sk?" sel":"");
    else cls="cda"+(k===tk?" td2":"")+(k===sk?" sel":"");
    var dt=tbd[k]||[];var dd=dbd[k]||[];var rm=cRem[k]||[];
    var dots='<div class="cdw">';
    dd.forEach(function(di){dots+='<div class="cdd" style="background:'+di.color+';color:#fff">⭐'+esc(di.name.substring(0,8))+"</div>";});
    dt.forEach(function(t){var c=CATS[t.cat]||CATS.personal;dots+='<div class="cdd" style="background:'+c.c+';color:#fff">'+c.i+esc(t.title.substring(0,8))+"</div>";});
    rm.forEach(function(r){dots+='<div class="cdd" style="background:#fef3c7;color:#92400e">📌'+esc(r.substring(0,8))+"</div>";});
    dots+="</div>";
    grid+='<div class="'+cls+'" onclick="selD(new Date('+cell.d.getFullYear()+","+cell.d.getMonth()+","+cell.d.getDate()+'))"><div class="cdn">'+cell.d.getDate()+"</div>"+dots+"</div>";
  });
  grid+="</div>";
  var ms=y+"-"+String(m+1).padStart(2,"0");
  var items=[];
  Object.keys(tbd).forEach(function(k){if(k.startsWith(ms))tbd[k].forEach(function(t){items.push({k:k,tp:"t",t:t});});});
  Object.keys(dbd).forEach(function(k){if(k.startsWith(ms))dbd[k].forEach(function(di){items.push({k:k,tp:"d",di:di});});});
  Object.keys(cRem).forEach(function(k){if(k.startsWith(ms))(cRem[k]||[]).forEach(function(r){items.push({k:k,tp:"r",tx:r});});});
  items.sort(function(a,b){return a.k.localeCompare(b.k);});
  var ag='<div class="cag"><div class="cat">Agenda '+MN[m]+" "+y+"</div>";
  if(items.length){items.forEach(function(it){var p=it.k.split("-");var ds=p[2]+"/"+p[1];if(it.tp==="t"){var c=CATS[it.t.cat]||CATS.personal;ag+='<div class="cai"><div class="cad">'+ds+'</div><div><div class="cax">'+esc(it.t.title)+'</div><span class="cak" style="background:'+c.b+";color:"+c.c+'">'+c.i+" "+c.l+"</span></div></div>";}else if(it.tp==="d"){ag+='<div class="cai"><div class="cad">'+ds+'</div><div><div class="cax">⭐ '+esc(it.di.name)+'</div><span class="cak" style="background:'+it.di.color+'22;color:'+it.di.color+'">Important</span></div></div>';}else{ag+='<div class="cai"><div class="cad">'+ds+'</div><div class="cax">📌 '+esc(it.tx)+"</div></div>";}});}else{ag+='<div class="cae">Sense dates aquest mes</div>';}
  ag+="</div>";
  var t2=new Date();t2.setHours(0,0,0,0);
  var diS='<div class="dic"><div class="dit">⭐ Dates Importants</div>';
  var sorted=cDI.slice().sort(function(a,b){return a.date.localeCompare(b.date);});
  sorted.forEach(function(di){
    var p=di.date.split("-");var diD=new Date(parseInt(p[0]),parseInt(p[1])-1,parseInt(p[2]));
    var diff=Math.round((diD-t2)/(1000*60*60*24));
    var cls2=diff<0?"pa":diff<=30?"pr":"ll";
    var txt=diff<0?"Passat":diff===0?"Avui!":diff===1?"Dema":diff+"d";
    diS+='<div class="dii"><div class="dico" style="background:'+di.color+'"></div><div class="dim"><div class="din">'+esc(di.name)+'</div><div class="did">'+p[2]+"/"+p[1]+"/"+p[0]+'</div></div><span class="dic2 '+cls2+'">'+txt+'</span><button class="didd" onclick="delDI(''+di.id+'')">✕</button></div>';
  });
  diS+='<div class="daf"><div style="font-size:10px;font-weight:600;color:#9aa5b4;text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px">Afegir</div><input class="dai" id="din2" placeholder="Nom de l event"><div class="dr"><input class="dai" type="date" id="did2" style="flex:1;margin-bottom:0"><select class="dcs" id="dic3"><option value="#0090b8">Blau</option><option value="#16a34a">Verd</option><option value="#d97706">Groc</option><option value="#e53e3e">Vermell</option><option value="#9333ea">Lila</option></select></div><button class="dab" onclick="addDI()">+ Afegir</button></div></div>';
  var remS='<div class="dic"><div class="dit">📌 Recordatoris</div>';
  var allR=[];Object.keys(cRem).forEach(function(k){(cRem[k]||[]).forEach(function(r){allR.push({k:k,tx:r});});});
  allR.sort(function(a,b){return a.k.localeCompare(b.k);});
  function dk2(d){return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}
  var fut=allR.filter(function(r){return r.k>=dk2(today);}).slice(0,5);
  if(fut.length){fut.forEach(function(r){var p=r.k.split("-");remS+='<div class="dii"><div class="dim"><div class="din">'+esc(r.tx)+'</div><div class="did">'+p[2]+"/"+p[1]+"/"+p[0]+"</div></div></div>";});}
  else{remS+='<div class="cae">Sense recordatoris</div>';}
  remS+="</div>";
  document.getElementById("root").innerHTML='<div class="cly"><div><div class="clh"><div class="clt">'+MN[m]+" "+y+'</div><div class="cln"><button class="clb" onclick="cPrev()">◀</button><button class="clb" onclick="cToday()">Avui</button><button class="clb" onclick="cNext()">▶</button></div></div>'+grid+ag+'</div><div>'+diS+remS+'</div></div>';
}
function cPrev(){cM--;if(cM<0){cM=11;cY--;}render();}
function cNext(){cM++;if(cM>11){cM=0;cY++;}render();}
function cToday(){var t=new Date();cY=t.getFullYear();cM=t.getMonth();render();}
function addDI(){var n=document.getElementById("din2");var d=document.getElementById("did2");var c=document.getElementById("dic3");if(!n||!d||!n.value.trim()||!d.value)return;cDI.push({id:uid(),name:n.value.trim(),date:d.value,color:c.value});saveDI();render();toast("Data afegida");}
function delDI(id){cDI=cDI.filter(function(d){return d.id!==id;});saveDI();render();}
function selD(date){
  cSel=date;render();
  var MN=["Gener","Febrer","Marc","Abril","Maig","Juny","Juliol","Agost","Setembre","Octubre","Novembre","Desembre"];
  function dk(d){return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}
  var k=dk(date);var rm=cRem[k]||[];
  var td=tasks.filter(function(t){return t.fecha===k;});
  var dd=cDI.filter(function(di){return di.date===k;});
  var modal=document.createElement("div");modal.className="rmb";modal.id="rmm";
  var tH=td.length?"<div style='font-size:10px;font-weight:600;color:#9aa5b4;text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px'>Tasques</div>"+td.map(function(t){var c=CATS[t.cat]||CATS.personal;return"<div class='rit'>"+c.i+" "+esc(t.title)+"</div>";}).join(""):"";
  var dH=dd.length?"<div style='font-size:10px;font-weight:600;color:#9aa5b4;text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px;margin-top:8px'>Dates importants</div>"+dd.map(function(di){return"<div class='rit' style='color:"+di.color+";font-weight:600'>⭐ "+esc(di.name)+"</div>";}).join(""):"";
  var rH=rm.length?"<div style='font-size:10px;font-weight:600;color:#9aa5b4;text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px;margin-top:8px'>Recordatoris</div>"+rm.map(function(r,i){return"<div class='rit'>📌 "+esc(r)+"<button class='rid' onclick="dRem('"+k+"',"+i+")">✕</button></div>";}).join(""):"";
  modal.innerHTML="<div class='rmd'><h3>"+date.getDate()+" "+MN[date.getMonth()]+" "+date.getFullYear()+"</h3>"+tH+dH+rH+"<div style='font-size:10px;font-weight:600;color:#9aa5b4;text-transform:uppercase;letter-spacing:.8px;margin-top:12px;margin-bottom:6px'>Recordatori</div><div class='rar'><input class='rai' id='ri' placeholder='Escriu un recordatori...' onkeydown="if(event.key==='Enter')aRem('"+k+"')"><button class='rab' onclick="aRem('"+k+"')">+ Afegir</button></div><button class='rcb' onclick='cRm()'>Tancar</button></div>";
  document.body.appendChild(modal);modal.addEventListener("click",function(e){if(e.target===modal)cRm();});
  setTimeout(function(){var i=document.getElementById("ri");if(i)i.focus();},50);
}
function cRm(){var m=document.getElementById("rmm");if(m)m.remove();}
function aRem(k){var i=document.getElementById("ri");var t=i?i.value.trim():"";if(!t)return;if(!cRem[k])cRem[k]=[];cRem[k].push(t);saveRem();cRm();render();toast("Recordatori afegit");}
function dRem(k,i){if(cRem[k]){cRem[k].splice(i,1);if(!cRem[k].length)delete cRem[k];}saveRem();cRm();render();}

function rVend(){
  var all=[];tasks.forEach(function(t){(t.vender||[]).forEach(function(v){all.push(Object.assign({},v,{tt:t.title,tc:t.cat}));});});
  var tv=all.filter(function(v){return v.state==="vendido";}).reduce(function(a,v){return a+(parseFloat(v.price)||0);},0);
  var td=all.filter(function(v){return v.state==="disponible";}).reduce(function(a,v){return a+(parseFloat(v.price)||0);},0);
  var nr=all.filter(function(v){return v.state==="reservado";}).length;
  var h='<div class="vsr"><div class="st"><div class="sn">'+all.length+'</div><div class="sl">Articles</div></div><div class="st"><div class="sn" style="color:#16a34a">'+tv.toFixed(0)+' €</div><div class="sl">Venut</div></div><div class="st"><div class="sn" style="color:#3b82f6">'+td.toFixed(0)+' €</div><div class="sl">Disponible</div></div><div class="st"><div class="sn" style="color:#d97706">'+nr+'</div><div class="sl">Reservats</div></div></div>';
  h+='<div class="vv">'+[{id:"disponible",l:"Disponible",c:"#16a34a"},{id:"reservado",l:"Reservat",c:"#d97706"},{id:"vendido",l:"Venut",c:"#6b7280"}].map(function(sc){var its=all.filter(function(v){return v.state===sc.id;});return'<div class="vvc"><div class="vvh"><span class="vvt" style="color:'+sc.c+'">'+sc.l+'</span><span class="vvc2">'+its.length+'</span></div><div class="vvb">'+(its.length?its.map(function(v){var c=CATS[v.tc]||CATS.personal;return'<div class="vca"><div class="vcn">'+esc(v.name)+'</div>'+(v.price?'<div class="vcp" style="color:'+sc.c+'">'+parseFloat(v.price).toFixed(2)+' €</div>':'')+'<div class="vcf">'+c.i+" "+esc(v.tt)+"</div>"+(v.note?'<div class="vcno">'+esc(v.note)+"</div>":"")+"</div>";}).join(""):'<div style="font-size:12px;color:#9aa5b4;text-align:center;padding:16px">Sense articles</div>')+"</div></div>";}).join("")+"</div>";
  document.getElementById("root").innerHTML=h;
}

function sf(c){fcat=c;render();}
function tD(id){od[id]=!od[id];if(!ot[id])ot[id]="n";render();}
function st(id,tab){ot[id]=tab;render();}
function sd2(id){var t=tasks.find(function(x){return x.id===id;});var el=document.getElementById("dx-"+id);if(t&&el){t.detail=el.value;save();render();toast("Guardat");}}
function sm2(id){var t=tasks.find(function(x){return x.id===id;});var el=document.getElementById("dx2-"+id);if(t&&el){t.fecha=el.value;save();render();toast("Guardat");}}
function tc2(id,i){var t=tasks.find(function(x){return x.id===id;});if(t&&t.checklist[i]){t.checklist[i].done=!t.checklist[i].done;save();render();}}
function dc(id,i){var t=tasks.find(function(x){return x.id===id;});if(t){t.checklist.splice(i,1);save();render();}}
function ac(id){var inp=document.getElementById("ci-"+id);var tx=inp?inp.value.trim():"";if(!tx)return;var t=tasks.find(function(x){return x.id===id;});if(t){if(!t.checklist)t.checklist=[];t.checklist.push({text:tx,done:false});save();render();}}
function al2(id){var inp=document.getElementById("li-"+id);var url=inp?inp.value.trim():"";if(!url)return;if(url.indexOf("http")!==0)url="https://"+url;var t=tasks.find(function(x){return x.id===id;});if(t){if(!t.links)t.links=[];t.links.push(url);save();render();}}
function dl2(id,i){var t=tasks.find(function(x){return x.id===id;});if(t){t.links.splice(i,1);save();render();}}
function av2(id){var n=document.getElementById("vn2-"+id);var p=document.getElementById("vp2-"+id);var no=document.getElementById("vno2-"+id);var name=n?n.value.trim():"";if(!name)return;var t=tasks.find(function(x){return x.id===id;});if(t){if(!t.vender)t.vender=[];t.vender.push({name:name,price:p?p.value:"",note:no?no.value.trim():"",state:"disponible"});save();render();}}
function dv(id,i){var t=tasks.find(function(x){return x.id===id;});if(t){t.vender.splice(i,1);save();render();}}
function cvs(id,i,state){var t=tasks.find(function(x){return x.id===id;});if(t&&t.vender[i]){t.vender[i].state=state;save();render();}}
function mv(id,col){var t=tasks.find(function(x){return x.id===id;});if(t){t.col=col;save();render();toast("Mogut");}}
function eT(id){openM(id,null);}
function dT(id){if(!confirm("Eliminar?"))return;tasks=tasks.filter(function(x){return x.id!==id;});delete od[id];save();render();toast("Eliminada");}
function openM(id,col){
  editId=id;addCol=col;
  document.getElementById("mdt").textContent=id?"Editar tasca":"Nova tasca";
  if(id){var t=tasks.find(function(x){return x.id===id;});document.getElementById("ft").value=t.title;document.getElementById("fc").value=t.cat;document.getElementById("fp").value=t.prio;document.getElementById("fn").value=t.note||"";document.getElementById("fh").value=t.hoy||"";}
  else{document.getElementById("ft").value="";document.getElementById("fc").value="sincro";document.getElementById("fp").value="media";document.getElementById("fn").value="";document.getElementById("fh").value="";}
  document.getElementById("modal").style.display="flex";
  setTimeout(function(){document.getElementById("ft").focus();},60);
}
function closeM(){document.getElementById("modal").style.display="none";editId=null;addCol=null;}
function saveT(){
  var title=document.getElementById("ft").value.trim();if(!title)return;
  var t;
  if(editId){t=tasks.find(function(x){return x.id===editId;});t.title=title;t.cat=document.getElementById("fc").value;t.prio=document.getElementById("fp").value;t.note=document.getElementById("fn").value.trim();t.hoy=document.getElementById("fh").value;}
  else{t={id:uid(),title:title,cat:document.getElementById("fc").value,prio:document.getElementById("fp").value,note:document.getElementById("fn").value.trim(),col:addCol||"pendiente",hoy:document.getElementById("fh").value,detail:"",checklist:[],fecha:"",links:[],vender:[]};tasks.push(t);}
  closeM();save();render();toast(editId?"Actualitzat":"Creat");
}
document.getElementById("modal").addEventListener("click",function(e){if(e.target===this)closeM();});
document.addEventListener("keydown",function(e){if(e.key==="Escape")closeM();});
load();
</script>
