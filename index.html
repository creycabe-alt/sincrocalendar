  background-size:cover;background-position:center 35%;
  height:120px;position:sticky;top:0;z-index:10;
  display:flex;flex-direction:column;justify-content:space-between;
  border-bottom:3px solid var(--cyan2);
}
.header-overlay{
  position:absolute;inset:0;
  background:linear-gradient(180deg,rgba(5,20,45,.55) 0%,rgba(5,20,45,.7) 100%);
}
.header-top{
  position:relative;z-index:1;
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 1.5rem 0;
}
.logo{font-family:"Barlow Condensed",sans-serif;font-weight:800;font-size:22px;
  letter-spacing:1px;color:#fff;text-shadow:0 1px 4px rgba(0,0,0,.3)}
.logo span{color:#48cae4}
.header-right{display:flex;align-items:center;gap:10px}
.sync-dot{width:7px;height:7px;border-radius:50%;background:#4ade80;flex-shrink:0}
.sync-dot.loading{background:#fbbf24;animation:blink 1s infinite}
.sync-dot.error{background:#f87171}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.sync-label{font-size:11px;color:rgba(255,255,255,.7)}
.new-btn{font-size:12px;font-weight:600;padding:6px 14px;border-radius:20px;
  background:#48cae4;color:#0d1f35;border:none;cursor:pointer;
  font-family:"Inter",sans-serif;transition:.15s}
.new-btn:hover{background:#90e0ef}

/* NAV tabs at bottom of header */
.header-nav{
  position:relative;z-index:1;
  display:flex;padding:0 1.5rem;gap:2px;
}
.nav-pill{font-size:12px;font-weight:500;padding:7px 16px;
  border-radius:8px 8px 0 0;border:none;
  background:rgba(255,255,255,.15);color:rgba(255,255,255,.75);
  cursor:pointer;font-family:"Inter",sans-serif;transition:.15s;
  backdrop-filter:blur(4px);
}
.nav-pill:hover{background:rgba(255,255,255,.25);color:#fff}
.nav-pill.active{background:#ffffff;color:var(--text);font-weight:600}

/* MAIN */
.main{flex:1;padding:1.5rem;max-width:1440px;width:100%;margin:0 auto}

/* PROJECT CARDS */
.proj-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin-bottom:1.25rem}
.proj-card{background:var(--surface);border-radius:12px;border:1px solid var(--border);
  padding:16px 18px;position:relative;overflow:hidden;box-shadow:var(--shadow)}
.proj-card::before{content:"";position:absolute;inset:0 auto 0 0;width:4px}
.pc-sincro::before{background:var(--cyan2)}
.pc-cowork::before{background:var(--cowork)}
.proj-icon{font-size:20px;margin-bottom:6px}
.proj-name{font-size:14px;font-weight:600;color:var(--text)}
.proj-sub{font-size:11px;color:var(--text3);margin-top:1px}
.proj-nums{display:flex;gap:14px;margin-top:10px;flex-wrap:wrap}
.pnum{font-size:11px;color:var(--text2)}
.pnum strong{font-size:20px;font-weight:700;font-family:"Barlow Condensed",sans-serif;color:var(--text);display:block;line-height:1.1}
.proj-bar{height:3px;background:var(--border);border-radius:2px;margin-top:10px;overflow:hidden}
.proj-fill-sincro{height:100%;background:linear-gradient(90deg,var(--cyan),var(--cyan2));transition:width .4s}
.proj-fill-cowork{height:100%;background:linear-gradient(90deg,var(--cowork),#a78bfa);transition:width .4s}

/* STATS */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:1.25rem}
.stat{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);
  padding:12px 16px;box-shadow:var(--shadow)}
.stat-n{font-family:"Barlow Condensed",sans-serif;font-size:28px;font-weight:700;line-height:1;color:var(--text)}
.stat-l{font-size:11px;color:var(--text3);margin-top:2px}

/* FILTERS */
.filter-bar{display:flex;gap:6px;margin-bottom:1rem;flex-wrap:wrap;align-items:center}
.flabel{font-size:11px;color:var(--text3);margin-right:2px;font-weight:500}
.fchip{font-size:12px;padding:4px 12px;border-radius:20px;border:1px solid var(--border);
  background:var(--surface);color:var(--text2);cursor:pointer;font-family:"Inter",sans-serif;transition:.1s}
.fchip:hover{border-color:var(--cyan2);color:var(--cyan)}
.fchip.on{background:var(--cyan-bg);color:var(--cyan);border-color:var(--cyan-border);font-weight:500}

/* BOARD */
.board{display:grid;grid-template-columns:repeat(auto-fit,minmax(215px,1fr));gap:12px}
.col{background:var(--surface2);border-radius:12px;border:1px solid var(--border);
  overflow:hidden;display:flex;flex-direction:column}
.col-head{padding:10px 14px 9px;display:flex;align-items:center;justify-content:space-between;
  background:var(--surface);border-bottom:1px solid var(--border)}
.col-label{font-family:"Barlow Condensed",sans-serif;font-size:13px;font-weight:700;
  letter-spacing:.8px;text-transform:uppercase;display:flex;align-items:center;gap:7px;color:var(--text)}
.col-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.col-cnt{font-size:11px;background:var(--bg);border:1px solid var(--border);
  border-radius:10px;padding:1px 8px;color:var(--text2)}
.col-prog{height:2px;background:var(--border)}
.col-pfill{height:100%;transition:width .3s}
.tasks-list{padding:7px;display:flex;flex-direction:column;gap:5px;flex:1}
.empty-col{font-size:12px;color:var(--text3);text-align:center;padding:20px;font-style:italic}
.add-zone{padding:0 7px 7px}
.add-task-btn{width:100%;font-size:12px;padding:7px;border:1.5px dashed var(--border);
  border-radius:var(--radius);background:transparent;color:var(--text3);cursor:pointer;
  font-family:"Inter",sans-serif;transition:.15s;display:flex;align-items:center;justify-content:center;gap:4px}
.add-task-btn:hover{border-color:var(--cyan-border);color:var(--cyan);background:var(--cyan-bg)}

/* TASK CARD */
.tcard{background:var(--surface);border:1px solid var(--border);border-radius:9px;
  overflow:hidden;box-shadow:var(--shadow);transition:border-color .15s,box-shadow .15s}
.tcard:hover{border-color:var(--border2);box-shadow:0 2px 8px rgba(0,0,0,.08)}
.tcard.urgent{border-left:3px solid var(--red)}
.tcard-accent{height:2px;width:100%}
.tbody{padding:10px 12px}
.ttitle{font-size:13px;font-weight:500;line-height:1.4;color:var(--text);margin-bottom:4px}
.tnote{font-size:11px;color:var(--text2);line-height:1.4;margin-bottom:5px}
.tchips{display:flex;gap:4px;flex-wrap:wrap;align-items:center;margin-bottom:7px}
.chip{font-size:10px;padding:2px 7px;border-radius:5px;font-weight:600;letter-spacing:.2px}
.ch-alta{background:#fffbeb;color:var(--amber);border:1px solid #fde68a}
.ch-media{background:#eff6ff;color:#2563eb;border:1px solid #bfdbfe}
.ch-baja{background:var(--green-bg);color:var(--green);border:1px solid #bbf7d0}
.ch-hoy{background:var(--red-bg);color:var(--red);border:1px solid #fecaca}
.ch-cat{font-size:10px;padding:2px 7px;border-radius:5px;font-weight:500}
.ch-date{font-size:10px;color:var(--cyan)}
.ch-check{font-size:10px;color:var(--text3)}
.tfooter{display:flex;align-items:center;justify-content:space-between;gap:4px;flex-wrap:wrap}
.move-btns{display:flex;gap:3px;flex-wrap:wrap}
.mbtn{font-size:10px;padding:2px 7px;border:1px solid var(--border);border-radius:4px;
  background:transparent;color:var(--text2);cursor:pointer;font-family:"Inter",sans-serif;transition:.1s}
.mbtn:hover{background:var(--cyan-bg);border-color:var(--cyan-border);color:var(--cyan)}
.tctrl{display:flex;gap:3px;align-items:center}
.icbtn{width:24px;height:24px;border:1px solid var(--border);border-radius:5px;
  background:transparent;color:var(--text2);cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-size:11px;transition:.1s}
.icbtn:hover{background:var(--bg);border-color:var(--border2)}
.icbtn.del:hover{background:var(--red-bg);color:var(--red);border-color:#fecaca}
.expbtn{font-size:10px;padding:3px 9px;border:1px solid var(--border);border-radius:5px;
  background:transparent;color:var(--text2);cursor:pointer;font-family:"Inter",sans-serif;
  display:flex;align-items:center;gap:3px;white-space:nowrap;transition:.1s}
.expbtn:hover{background:var(--bg)}
.expbtn.open{background:var(--cyan-bg);color:var(--cyan);border-color:var(--cyan-border)}
.arrow{display:inline-block;transition:transform .2s;font-size:8px}
.expbtn.open .arrow{transform:rotate(180deg)}

/* DETAIL */
.tdetail{border-top:1px solid var(--border);background:var(--surface2)}
.dtabs{display:flex;background:var(--surface);border-bottom:1px solid var(--border);overflow-x:auto}
.dtab{font-size:11px;padding:8px 12px;cursor:pointer;color:var(--text2);
  border:none;background:transparent;border-bottom:2px solid transparent;
  font-family:"Inter",sans-serif;white-space:nowrap;transition:.1s}

var tasks=[],editId=null,addToCol=null,filterCat="all",openDetail={},openTab={},view="board";

// ── PERSISTENCE ───────────────────────────────────────────────────────────────
function loadLocal(){
  try{var r=localStorage.getItem("sg_reminders");if(r)calReminders=JSON.parse(r);}catch(e){}
  try{var d=localStorage.getItem("sg_dates");if(d)datesImportants=JSON.parse(d);}catch(e){}
  if(!datesImportants.length){
    datesImportants=[
      {id:"di1",name:"Exhibició final de curs",date:"2027-06-13",color:"#0090b8"},
      {id:"di2",name:"Jornada Porta un amic/a",date:"2026-10-01",color:"#16a34a"},
      {id:"di3",name:"Inici temporada 2026-27",date:"2026-09-15",color:"#d97706"}
    ];
    saveLocal();
  }
}
function saveLocal(){
  try{localStorage.setItem("sg_reminders",JSON.stringify(calReminders));}catch(e){}
  try{localStorage.setItem("sg_dates",JSON.stringify(datesImportants));}catch(e){}
}

async function loadData(){
  setSync("loading","Carregant...");
  try{
    var r=await sb.from("tasks").select("*").order("created_at");
    if(r.error)throw r.error;
    tasks=r.data||[];
    if(!tasks.length)await seedData();
    else tasks=tasks.map(function(t){return Object.assign({checklist:[],links:[],vender:[],detail:"",fecha:"",hoy:""},t);});
    setSync("ok","Sincronitzat ✓");render();
  }catch(e){setSync("error","Error connexió");console.error(e);}
}
async function seedData(){
  try{var r=await sb.from("tasks").insert(SEED);if(r.error)throw r.error;tasks=SEED.slice();}
  catch(e){tasks=SEED.slice();}
}
async function upsertTask(t){
  try{var r=await sb.from("tasks").upsert(t);if(r.error)throw r.error;setSync("ok","Guardat ✓");}
  catch(e){setSync("error","Error al guardar");}
}
async function removeTask(id){
  try{await sb.from("tasks").delete().eq("id",id);}catch(e){}
}

function setSync(state,msg){
  var d=document.getElementById("sync-dot"),l=document.getElementById("sync-label");
  d.className="sync-dot"+(state==="ok"?"":(" "+state));l.textContent=msg;
}
function showToast(msg){
  var t=document.getElementById("toast");t.textContent=msg;t.className="toast show";
  setTimeout(function(){t.className="toast";},2200);
}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function esc(s){if(s==null)return"";return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function filtered(){return filterCat==="all"?tasks:tasks.filter(function(t){return t.cat===filterCat;});}

function render(){
  renderNav();
  if(view==="board")renderBoard();
  else if(view==="calendar")renderCalendar();

}
function renderNav(){

    [["board","📋 Tasques"],["calendar","📅 Calendari"],["vender","🏷️ Vendre"]].map(function(p){
      return "<button class="nav-pill"+(view===p[0]?" active":"")+"" onclick="setView('"+p[0]+"')">"+p[1]+"</button>";
    }).join("");
}
function setView(v){view=v;render();}

// ── BOARD ─────────────────────────────────────────────────────────────────────
function renderBoard(){
  var v=filtered();
  var done=v.filter(function(t){return t.col==="hecho";}).length;
  var alta=v.filter(function(t){return t.prio==="alta"&&t.col!=="hecho";}).length;
  var hoy=v.filter(function(t){return t.hoy==="1"&&t.col!=="hecho";}).length;
  var curso=v.filter(function(t){return t.col==="en-curso";}).length;
  var h="<div class="proj-row">"+PROJS.map(projCardHtml).join("")+"</div>";
  h+="<div class="stats-row">"+sHtml(v.length,"Total","")+sHtml(curso,"En curs","color:#3b82f6")+sHtml(hoy,"Avui","color:#e53e3e")+sHtml(done,"Fetes","color:#16a34a")+"</div>";
  h+="<div class="filter-bar"><span class="flabel">Filtrar:</span>"+
    [["all","Totes"],["sincro","🏊 Sincro"],["cowork","🏢 Cowork"],["casa","🏠 Casa"],["gastos","💶 Gastos"],["personal","✨ Personal"],["viajes","✈️ Viajes"]].map(function(p){
      return "<button class="fchip"+(filterCat===p[0]?" on":"")+"" onclick="setFilter('"+p[0]+"')">"+p[1]+"</button>";
    }).join("")+"</div>";
  h+="<div class="board">"+COLS.map(function(col){return colHtml(col,v);}).join("")+"</div>";
  document.getElementById("root").innerHTML=h;
}
function sHtml(n,l,s){return "<div class="stat"><div class="stat-n""+(s?" style=""+s+""":"")+">"+n+"</div><div class="stat-l">"+l+"</div></div>";}
function projCardHtml(p){
  var pt=tasks.filter(function(t){return t.cat===p.id;});
  var done=pt.filter(function(t){return t.col==="hecho";}).length;
  var pct=pt.length?Math.round(done/pt.length*100):0;
  var alta=pt.filter(function(t){return t.prio==="alta"&&t.col!=="hecho";}).length;
  var hoy=pt.filter(function(t){return t.hoy==="1"&&t.col!=="hecho";}).length;
  var c=CATS[p.id];
  return "<div class="proj-card "+p.cls+""><div class="proj-icon">"+c.icon+"</div>"
    +"<div class="proj-name">"+p.name+"</div><div class="proj-sub">"+p.sub+"</div>"
    +"<div class="proj-nums"><div class="pnum"><strong>"+pt.length+"</strong>tasques</div>"
    +"<div class="pnum"><strong>"+done+"</strong>fetes</div>"
    +(alta?"<div class="pnum"><strong style="color:#e53e3e">"+alta+"</strong>urgents</div>":"")
    +(hoy?"<div class="pnum"><strong style="color:#e53e3e">"+hoy+"</strong>avui</div>":"")
    +"</div><div class="proj-bar"><div class="proj-fill-"+p.cls+"" style="width:"+pct+"%"></div></div></div>";
}
function colHtml(col,v){
  var ct=v.filter(function(t){return t.col===col.id;});
  var pct=v.length?Math.round(ct.length/v.length*100):0;
  return "<div class="col"><div class="col-head"><span class="col-label"><span class="col-dot" style="background:"+col.dot+""></span>"+col.label+"</span><span class="col-cnt">"+ct.length+"</span></div>"
    +"<div class="col-prog"><div class="col-pfill" style="width:"+pct+"%;background:"+col.dot+""></div></div>"
    +"<div class="tasks-list">"+(ct.length?ct.map(taskHtml).join(""):"<div class="empty-col">Sense tasques</div>")+"</div>"
    +"<div class="add-zone"><button class="add-task-btn" onclick="openModal(null,'"+col.id+"')">+ Afegir tasca</button></div></div>";
}
function taskHtml(t){
  var c=CATS[t.cat]||CATS.personal;
  var cl=t.checklist||[];
  var clD=cl.filter(function(i){return i.done;}).length;
  var isOpen=!!openDetail[t.id];
  var tab=openTab[t.id]||"notas";
  var moves=COLS.filter(function(cc){return cc.id!==t.col;}).map(function(cc){
    return "<button class="mbtn" onclick="moveTask('"+t.id+"','"+cc.id+"')">"+cc.label+"</button>";
  }).join("");
  return "<div class="tcard"+(t.hoy==="1"?" urgent":"")+"">"
    +"<div class="tcard-accent" style="background:"+c.color+";opacity:.5"></div>"
    +"<div class="tbody"><div class="ttitle">"+esc(t.title)+"</div>"
    +(t.note?"<div class="tnote">"+esc(t.note)+"</div>":"")
    +"<div class="tchips"><span class="chip ch-"+t.prio+"">"+t.prio+"</span>"
    +"<span class="ch-cat" style="background:"+c.bg+";color:"+c.color+"">"+c.icon+" "+c.label+"</span>"
    +(t.hoy==="1"?"<span class="chip ch-hoy">avui</span>":"")
    +(t.fecha?"<span class="ch-date">📅 "+esc(t.fecha)+"</span>":"")
    +(cl.length?"<span class="ch-check">"+clD+"/"+cl.length+" ✓</span>":"")
    +"</div><div class="tfooter"><div class="move-btns">"+moves+"</div><div class="tctrl">"
    +"<button class="icbtn" onclick="editTask('"+t.id+"')">✏️</button>"
    +"<button class="icbtn del" onclick="delTask('"+t.id+"')">🗑</button>"
    +"<button class="expbtn"+(isOpen?" open":"")+"" onclick="toggleDetail('"+t.id+"')">"+( isOpen?"Tancar":"Més info")+" <span class="arrow">▼</span></button>"
    +"</div></div></div>"+(isOpen?detailHtml(t,tab):"")+"</div>";

function detailHtml(t,tab){

  var vl=t.vender||[];var vT=vl.filter(function(v){return v.state==="vendido";}).reduce(function(a,v){return a+(parseFloat(v.price)||0);},0);

  h+="<div class="dpanel"+(tab==="info"?" on":"")+"">"
    +"<div class="info-block"><div class="dlabel">Data límit</div><input class="dinput" type="date" id="dfecha-"+t.id+"" value=""+esc(t.fecha||"")+""></div>"
    +"<div class="info-block"><div class="dlabel">Enllaç</div><div class="addrow"><input class="addinp" id="dlink-"+t.id+"" placeholder="https://..."><button class="addbtn" onclick="addLink('"+t.id+"')">+ Afegir</button></div>"
    +((t.links&&t.links.length)?t.links.map(function(l,i){return "<div class="lnkitem"><a href=""+esc(l)+"" target="_blank">🔗 "+esc(l)+"</a><button class="ldel" onclick="delLink('"+t.id+"',"+i+")">✕</button></div>";}).join(""):"")
    +"</div><button class="sbtn" onclick="saveMeta('"+t.id+"')">Guardar</button></div>";

// ── CALENDAR ──────────────────────────────────────────────────────────────────
function renderCalendar(){
  var MONTHS=["Gener","Febrer","Març","Abril","Maig","Juny","Juliol","Agost","Setembre","Octubre","Novembre","Desembre"];
  var DAYS=["Dl","Dt","Dc","Dj","Dv","Ds","Dg"];
  var today=new Date();
  var y=calYear,m=calMonth;
  var firstDay=new Date(y,m,1);
  var lastDay=new Date(y,m+1,0);
  var startDow=firstDay.getDay();
  var startOffset=(startDow===0)?6:startDow-1;
  var cells=[];
  for(var i=0;i<startOffset;i++){var d=new Date(y,m,1-startOffset+i);cells.push({date:d,cur:false});}
  for(var i=1;i<=lastDay.getDate();i++){cells.push({date:new Date(y,m,i),cur:true});}
  while(cells.length%7!==0){var last=cells[cells.length-1].date;var nd=new Date(last);nd.setDate(nd.getDate()+1);cells.push({date:nd,cur:false});}
  function dKey(d){return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}
  var tasksByDate={};
  tasks.forEach(function(t){if(t.fecha){if(!tasksByDate[t.fecha])tasksByDate[t.fecha]=[];tasksByDate[t.fecha].push(t);}});
  var diByDate={};
  datesImportants.forEach(function(di){if(di.date){if(!diByDate[di.date])diByDate[di.date]=[];diByDate[di.date].push(di);}});
  var todayKey=dKey(today);
  var selKey=calSelected?dKey(calSelected):null;
  var gridHtml="<div class="cal-grid">";
  DAYS.forEach(function(d){gridHtml+="<div class="cal-day-label">"+d+"</div>";});
  cells.forEach(function(cell){
    var key=dKey(cell.date);
    var cls="cal-day"+(cell.cur?"":"-other other-month")+(key===todayKey?" today":"")+(key===selKey?" selected":"");
    if(!cell.cur)cls="cal-day other-month"+(key===todayKey?" today":"")+(key===selKey?" selected":"");
    else cls="cal-day"+(key===todayKey?" today":"")+(key===selKey?" selected":"");
    var dt=tasksByDate[key]||[];
    var dd=diByDate[key]||[];
    var rems=calReminders[key]||[];
    var dots="<div class="cal-dot-wrap">";
    dd.forEach(function(di){dots+="<div class="cal-dot" style="background:"+di.color+";color:#fff;font-weight:600">⭐ "+esc(di.name.substring(0,12))+"</div>";});
    dt.forEach(function(t){var c=CATS[t.cat]||CATS.personal;dots+="<div class="cal-dot" style="background:"+c.color+";color:#fff">"+c.icon+" "+esc(t.title.substring(0,10))+"</div>";});
    rems.forEach(function(r){dots+="<div class="cal-dot" style="background:#fef3c7;color:#92400e">📌 "+esc(r.substring(0,10))+"</div>";});
    dots+="</div>";
    gridHtml+="<div class=""+cls+"" onclick="selectDay(new Date("+cell.date.getFullYear()+","+cell.date.getMonth()+","+cell.date.getDate()+"))">"
      +"<div class="cal-day-num">"+cell.date.getDate()+"</div>"+dots+"</div>";
  });
  gridHtml+="</div>";

  // Agenda
  var allItems=[];
  var mStr=y+"-"+String(m+1).padStart(2,"0");
  Object.keys(tasksByDate).forEach(function(k){if(k.startsWith(mStr))tasksByDate[k].forEach(function(t){allItems.push({key:k,type:"task",t:t});});});
  Object.keys(diByDate).forEach(function(k){if(k.startsWith(mStr))diByDate[k].forEach(function(di){allItems.push({key:k,type:"di",di:di});});});
  Object.keys(calReminders).forEach(function(k){if(k.startsWith(mStr))(calReminders[k]||[]).forEach(function(r){allItems.push({key:k,type:"rem",text:r});});});
  allItems.sort(function(a,b){return a.key.localeCompare(b.key);});
  var agendaHtml="<div class="cal-agenda"><div class="cal-agenda-title">Agenda — "+MONTHS[m]+" "+y+"</div>";
  if(allItems.length){
    allItems.forEach(function(item){
      var parts=item.key.split("-");
      var dateStr=parts[2]+"/"+parts[1];
      if(item.type==="task"){var c=CATS[item.t.cat]||CATS.personal;agendaHtml+="<div class="cal-agenda-item"><div class="cal-agenda-date">"+dateStr+"</div><div><div class="cal-agenda-text">"+esc(item.t.title)+"</div><span class="cal-agenda-cat" style="background:"+c.bg+";color:"+c.color+"">"+c.icon+" "+c.label+"</span></div></div>";}
      else if(item.type==="di"){agendaHtml+="<div class="cal-agenda-item"><div class="cal-agenda-date">"+dateStr+"</div><div><div class="cal-agenda-text">⭐ "+esc(item.di.name)+"</div><span class="cal-agenda-cat" style="background:"+item.di.color+"22;color:"+item.di.color+"">Data important</span></div></div>";}
      else{agendaHtml+="<div class="cal-agenda-item"><div class="cal-agenda-date">"+dateStr+"</div><div><div class="cal-agenda-text">📌 "+esc(item.text)+"</div><span class="cal-agenda-cat" style="background:#fef3c7;color:#92400e">Recordatori</span></div></div>";}
    });
  }else{agendaHtml+="<div class="cal-empty">Sense dates aquest mes</div>";}
  agendaHtml+="</div>";

  // Dates importants sidebar
  var today2=new Date();today2.setHours(0,0,0,0);
  var diSidebar="<div class="di-card"><div class="di-title">⭐ Dates Importants</div>";
  var sorted=datesImportants.slice().sort(function(a,b){return a.date.localeCompare(b.date);});
  sorted.forEach(function(di){
    var parts=di.date.split("-");
    var diDate=new Date(parseInt(parts[0]),parseInt(parts[1])-1,parseInt(parts[2]));
    var diff=Math.round((diDate-today2)/(1000*60*60*24));
    var cdClass=diff<0?"passat":diff<=30?"proper":"lluny";
    var cdText=diff<0?"Passat":diff===0?"Avui!":diff===1?"Demà":diff+"d";
    diSidebar+="<div class="di-item">"
      +"<div class="di-color" style="background:"+di.color+""></div>"
      +"<div class="di-main"><div class="di-name">"+esc(di.name)+"</div>"
      +"<div class="di-date">"+parts[2]+"/"+parts[1]+"/"+parts[0]+"</div></div>"
      +"<span class="di-countdown "+cdClass+"">"+cdText+"</span>"
      +"<button class="di-del" onclick="delDI('"+di.id+"')">✕</button>"
      +"</div>";
  });
  diSidebar+="<div class="di-add-form">"
    +"<div class="dlabel" style="margin-bottom:8px">Afegir data important</div>"
    +"<input class="di-inp" id="di-name" placeholder="Nom de l'event">"
    +"<div class="di-row">"
    +"<input class="di-inp" type="date" id="di-date" style="flex:1;margin-bottom:0">"
    +"<select class="di-color-sel" id="di-color">"
    +"<option value="#0090b8">🔵 Blau</option>"
    +"<option value="#16a34a">🟢 Verd</option>"
    +"<option value="#d97706">🟡 Groc</option>"
    +"<option value="#e53e3e">🔴 Vermell</option>"
    +"<option value="#9333ea">🟣 Lila</option>"
    +"</select></div>"
    +"<button class="di-add-btn" onclick="addDI()">+ Afegir</button>"
    +"</div></div>";

  // Reminders card
  var remindersSoon="<div class="di-card"><div class="di-title">📌 Recordatoris propers</div>";
  var allRems=[];
  Object.keys(calReminders).forEach(function(k){(calReminders[k]||[]).forEach(function(r){allRems.push({key:k,text:r});});});
  allRems.sort(function(a,b){return a.key.localeCompare(b.key);});
  var futureRems=allRems.filter(function(r){return r.key>=dKey(today);}).slice(0,5);
  if(futureRems.length){
    futureRems.forEach(function(r){
      var parts=r.key.split("-");
      remindersSoon+="<div class="di-item"><div class="di-main"><div class="di-name">"+esc(r.text)+"</div><div class="di-date">"+parts[2]+"/"+parts[1]+"/"+parts[0]+"</div></div></div>";
    });
  }else{remindersSoon+="<div class="cal-empty">Sense recordatoris</div>";}
  remindersSoon+="</div>";

  document.getElementById("root").innerHTML=
    "<div class="cal-layout">"
    +"<div class="cal-main">"
      +"<div class="cal-header"><div class="cal-title">"+MONTHS[m]+" "+y+"</div>"
      +"<div class="cal-nav">"
      +"<button class="cal-nav-btn" onclick="calPrev()">◀</button>"
      +"<button class="cal-nav-btn" onclick="calToday()">Avui</button>"
      +"<button class="cal-nav-btn" onclick="calNext()">▶</button>"
      +"</div></div>"
      +gridHtml+agendaHtml
    +"</div>"
    +"<div class="cal-sidebar">"+diSidebar+remindersSoon+"</div>"
    +"</div>";
}

function calPrev(){calMonth--;if(calMonth<0){calMonth=11;calYear--;}render();}
function calNext(){calMonth++;if(calMonth>11){calMonth=0;calYear++;}render();}
function calToday(){var t=new Date();calYear=t.getFullYear();calMonth=t.getMonth();render();}

function addDI(){
  var name=document.getElementById("di-name");
  var date=document.getElementById("di-date");
  var color=document.getElementById("di-color");
  if(!name||!date||!name.value.trim()||!date.value)return;
  datesImportants.push({id:uid(),name:name.value.trim(),date:date.value,color:color.value});
  saveLocal();render();showToast("Data important afegida ✓");
}
function delDI(id){
  datesImportants=datesImportants.filter(function(d){return d.id!==id;});
  saveLocal();render();
}

function selectDay(date){
  calSelected=date;render();
  var MONTHS=["Gener","Febrer","Març","Abril","Maig","Juny","Juliol","Agost","Setembre","Octubre","Novembre","Desembre"];
  function dKey(d){return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}
  var key=dKey(date);
  var rems=calReminders[key]||[];
  var tasksDay=tasks.filter(function(t){return t.fecha===key;});
  var disDay=datesImportants.filter(function(di){return di.date===key;});
  var modal=document.createElement("div");
  modal.className="reminder-modal-bg";modal.id="rem-modal";
  var taskHtmlStr=tasksDay.length?"<div class="dlabel" style="margin-bottom:6px">Tasques</div><div class="reminder-list">"+tasksDay.map(function(t){var c=CATS[t.cat]||CATS.personal;return "<div class="reminder-item">"+c.icon+" <span>"+esc(t.title)+"</span></div>";}).join("")+"</div>":"";
  var diHtmlStr=disDay.length?"<div class="dlabel" style="margin-bottom:6px;margin-top:8px">Dates importants</div><div class="reminder-list">"+disDay.map(function(di){return "<div class="reminder-item">⭐ <span style="color:"+di.color+";font-weight:600">"+esc(di.name)+"</span></div>";}).join("")+"</div>":"";
  var remHtmlStr=rems.length?"<div class="dlabel" style="margin-bottom:6px;margin-top:8px">Recordatoris</div><div class="reminder-list" id="rem-list-"+key+"">"+rems.map(function(r,i){return "<div class="reminder-item">📌 <span>"+esc(r)+"</span><button class="reminder-item-del" onclick="delReminder('"+key+"',"+i+")">✕</button></div>";}).join("")+"</div>":"<div id="rem-list-"+key+""></div>";
  modal.innerHTML="<div class="reminder-modal">"
    +"<h3>"+date.getDate()+" "+MONTHS[date.getMonth()]+" "+date.getFullYear()+"</h3>"
    +taskHtmlStr+diHtmlStr+remHtmlStr
    +"<div class="dlabel" style="margin-top:12px;margin-bottom:6px">Afegir recordatori</div>"
    +"<div class="radd-row"><input class="radd-inp" id="rem-inp" placeholder="Escriu un recordatori..." onkeydown="if(event.key==='Enter')addReminder('"+key+"')"><button class="radd-btn" onclick="addReminder('"+key+"')">+ Afegir</button></div>"
    +"<button class="rclose-btn" onclick="closeRemModal()">Tancar</button></div>";
  document.body.appendChild(modal);
  modal.addEventListener("click",function(e){if(e.target===modal)closeRemModal();});
  setTimeout(function(){var inp=document.getElementById("rem-inp");if(inp)inp.focus();},50);
}
function closeRemModal(){var m=document.getElementById("rem-modal");if(m)m.remove();}
function addReminder(key){
  var inp=document.getElementById("rem-inp");
  var text=inp?inp.value.trim():"";if(!text)return;
  if(!calReminders[key])calReminders[key]=[];
  calReminders[key].push(text);saveLocal();closeRemModal();render();showToast("Recordatori afegit ✓");
}
function delReminder(key,i){
  if(calReminders[key]){calReminders[key].splice(i,1);if(!calReminders[key].length)delete calReminders[key];}
  saveLocal();closeRemModal();render();
}

// ── VENDER VIEW ───────────────────────────────────────────────────────────────
function renderVender(){
  var all=[];tasks.forEach(function(t){(t.vender||[]).forEach(function(v){all.push(Object.assign({},v,{taskTitle:t.title,taskCat:t.cat}));});});
  var tv=all.filter(function(v){return v.state==="vendido";}).reduce(function(a,v){return a+(parseFloat(v.price)||0);},0);
  var td=all.filter(function(v){return v.state==="disponible";}).reduce(function(a,v){return a+(parseFloat(v.price)||0);},0);
  var nr=all.filter(function(v){return v.state==="reservado";}).length;
  var h="<div class="vtop-stats">"+sHtml(all.length,"Articles","")+sHtml(tv.toFixed(0)+" €","Venut","color:#16a34a")+sHtml(td.toFixed(0)+" €","Disponible","color:#3b82f6")+sHtml(nr,"Reservats","color:#d97706")+"</div>";
  h+="<div class="vender-view">"
    +[{id:"disponible",label:"🟢 Disponible",color:"#16a34a"},{id:"reservado",label:"🟡 Reservat",color:"#d97706"},{id:"vendido",label:"✅ Venut",color:"#6b7280"}].map(function(sc){
      var its=all.filter(function(v){return v.state===sc.id;});
      return "<div class="vender-col"><div class="vcol-head"><span class="vcol-title" style="color:"+sc.color+"">"+sc.label+"</span><span class="vcol-count">"+its.length+"</span></div><div class="vcol-body">"
        +(its.length?its.map(function(v){var c=CATS[v.taskCat]||CATS.personal;return "<div class="vcard"><div class="vcard-name">"+esc(v.name)+"</div>"+(v.price?"<div class="vcard-price" style="color:"+sc.color+"">"+parseFloat(v.price).toFixed(2)+" €</div>":"")+"<div class="vcard-from">"+c.icon+" "+esc(v.taskTitle)+"</div>"+(v.note?"<div class="vcard-note">"+esc(v.note)+"</div>":"")+"</div>";}).join(""):"<div style="font-size:12px;color:#9aa5b4;text-align:center;padding:16px">Sense articles</div>")
        +"</div></div>";
    }).join("")+"</div>"
    +"<div style="margin-top:1rem;font-size:12px;color:#9aa5b4;text-align:center">Afegeix articles des de la pestanya 🏷️ Vendre dins de cada tasca</div>";
  document.getElementById("root").innerHTML=h;
}

// ── ACTIONS ───────────────────────────────────────────────────────────────────
function setFilter(c){filterCat=c;render();}
function toggleDetail(id){openDetail[id]=!openDetail[id];if(!openTab[id])openTab[id]="notas";render();}
function switchTab(id,tab){openTab[id]=tab;render();}
async function saveDetail(id){var t=tasks.find(function(x){return x.id===id;});var el=document.getElementById("dtext-"+id);if(t&&el){t.detail=el.value;await upsertTask(t);render();showToast("Guardat ✓");}}
async function saveMeta(id){var t=tasks.find(function(x){return x.id===id;});var el=document.getElementById("dfecha-"+id);if(t&&el){t.fecha=el.value;await upsertTask(t);render();showToast("Guardat ✓");}}
async function toggleCheck(id,i){var t=tasks.find(function(x){return x.id===id;});if(t&&t.checklist[i]){t.checklist[i].done=!t.checklist[i].done;await upsertTask(t);render();}}
async function delCheck(id,i){var t=tasks.find(function(x){return x.id===id;});if(t){t.checklist.splice(i,1);await upsertTask(t);render();}}
async function addCheck(id){var inp=document.getElementById("cl-"+id);var text=inp?inp.value.trim():"";if(!text)return;var t=tasks.find(function(x){return x.id===id;});if(t){if(!t.checklist)t.checklist=[];t.checklist.push({text:text,done:false});await upsertTask(t);render();}}
async function addLink(id){var inp=document.getElementById("dlink-"+id);var url=inp?inp.value.trim():"";if(!url)return;if(url.indexOf("http")!==0)url="https://"+url;var t=tasks.find(function(x){return x.id===id;});if(t){if(!t.links)t.links=[];t.links.push(url);await upsertTask(t);render();}}
async function delLink(id,i){var t=tasks.find(function(x){return x.id===id;});if(t){t.links.splice(i,1);await upsertTask(t);render();}}
async function addVender(id){var n=document.getElementById("vname-"+id);var p=document.getElementById("vprice-"+id);var no=document.getElementById("vnote-"+id);var name=n?n.value.trim():"";if(!name)return;var t=tasks.find(function(x){return x.id===id;});if(t){if(!t.vender)t.vender=[];t.vender.push({name:name,price:p?p.value:"",note:no?no.value.trim():"",state:"disponible"});await upsertTask(t);render();}}
async function delVender(id,i){var t=tasks.find(function(x){return x.id===id;});if(t){t.vender.splice(i,1);await upsertTask(t);render();}}
async function changeVenderState(id,i,state){var t=tasks.find(function(x){return x.id===id;});if(t&&t.vender[i]){t.vender[i].state=state;await upsertTask(t);render();}}
async function moveTask(id,col){var t=tasks.find(function(x){return x.id===id;});if(t){t.col=col;await upsertTask(t);render();showToast("Mogut ✓");}}
function editTask(id){openModal(id,null);}
async function delTask(id){if(!confirm("Eliminar aquesta tasca?"))return;tasks=tasks.filter(function(x){return x.id!==id;});delete openDetail[id];await removeTask(id);render();showToast("Eliminada");}

function openModal(id,col){
  editId=id;addToCol=col;
  document.getElementById("mtitle").textContent=id?"Editar tasca":"Nova tasca";
  if(id){var t=tasks.find(function(x){return x.id===id;});document.getElementById("f-title").value=t.title;document.getElementById("f-cat").value=t.cat;document.getElementById("f-prio").value=t.prio;document.getElementById("f-note").value=t.note||"";document.getElementById("f-hoy").value=t.hoy||"";}
  else{document.getElementById("f-title").value="";document.getElementById("f-cat").value="sincro";document.getElementById("f-prio").value="media";document.getElementById("f-note").value="";document.getElementById("f-hoy").value="";}
  document.getElementById("modal").style.display="flex";
  setTimeout(function(){document.getElementById("f-title").focus();},60);
}
function closeModal(){document.getElementById("modal").style.display="none";editId=null;addToCol=null;}
async function saveTask(){
  var title=document.getElementById("f-title").value.trim();if(!title)return;
  var t;
  if(editId){t=tasks.find(function(x){return x.id===editId;});t.title=title;t.cat=document.getElementById("f-cat").value;t.prio=document.getElementById("f-prio").value;t.note=document.getElementById("f-note").value.trim();t.hoy=document.getElementById("f-hoy").value;}
  else{t={id:uid(),title:title,cat:document.getElementById("f-cat").value,prio:document.getElementById("f-prio").value,note:document.getElementById("f-note").value.trim(),col:addToCol||"pendiente",hoy:document.getElementById("f-hoy").value,detail:"",checklist:[],fecha:"",links:[],vender:[]};tasks.push(t);}
  closeModal();await upsertTask(t);render();showToast(editId?"Actualitzat ✓":"Creat ✓");
}
document.getElementById("modal").addEventListener("click",function(e){if(e.target===this)closeModal();});
document.addEventListener("keydown",function(e){if(e.key==="Escape")closeModal();});

loadLocal();
loadData();
</script>
