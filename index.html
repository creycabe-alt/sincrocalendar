<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SincroGestio - Life Board</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
:root{
  --bg:#f4f6f8;--surface:#fff;--surface2:#f8f9fa;
  --border:#e4e8ed;--border2:#cdd3db;
  --text:#0d1f35;--text2:#4a5568;--text3:#9aa5b4;
  --cyan:#0090b8;--cyan2:#00b4d8;--cyan-bg:#e6f6fb;--cyan-border:#b3e4f5;
  --cowork:#6b5dd3;--cowork-bg:#f0eefb;
  --red:#e53e3e;--red-bg:#fff5f5;
  --amber:#d97706;--amber-bg:#fffbeb;
  --green:#16a34a;--green-bg:#f0fdf4;
  --shadow:0 1px 4px rgba(0,0,0,.07);
  --shadow-md:0 4px 16px rgba(0,0,0,.1);
  --radius:10px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Inter",sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.app{display:flex;flex-direction:column;min-height:100vh}

/* HEADER - gradient water effect */
.header{
  background:linear-gradient(135deg,#0077b6 0%,#0096c7 30%,#00b4d8 55%,#023e8a 100%);
  height:110px;position:sticky;top:0;z-index:10;
  display:flex;flex-direction:column;justify-content:space-between;
  border-bottom:3px solid #48cae4;
  box-shadow:0 2px 12px rgba(0,119,182,.3);
}
.header-overlay{
  position:absolute;inset:0;
  background:radial-gradient(ellipse at 20% 50%,rgba(72,202,228,.25) 0%,transparent 60%),
    radial-gradient(ellipse at 80% 30%,rgba(0,31,85,.3) 0%,transparent 50%);
}
.header-top{position:relative;z-index:1;
  display:flex;align-items:center;justify-content:space-between;padding:16px 1.5rem 0}
.logo{font-family:"Barlow Condensed",sans-serif;font-weight:800;font-size:24px;
  letter-spacing:2px;color:#fff;text-shadow:0 1px 6px rgba(0,0,0,.25)}
.logo span{color:#ade8f4}
.header-right{display:flex;align-items:center;gap:10px}
.sync-dot{width:7px;height:7px;border-radius:50%;background:#4ade80;flex-shrink:0}
.sync-dot.loading{background:#fbbf24;animation:blink 1s infinite}
.sync-dot.error{background:#f87171}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.sync-label{font-size:11px;color:rgba(255,255,255,.75)}
.new-btn{font-size:12px;font-weight:600;padding:6px 16px;border-radius:20px;
  background:rgba(255,255,255,.9);color:#0077b6;border:none;cursor:pointer;
  font-family:"Inter",sans-serif;transition:.15s}
.new-btn:hover{background:#fff}
.header-nav{position:relative;z-index:1;display:flex;padding:0 1.5rem;gap:2px}
.nav-pill{font-size:12px;font-weight:500;padding:7px 16px;border-radius:8px 8px 0 0;
  border:none;background:rgba(255,255,255,.18);color:rgba(255,255,255,.8);
  cursor:pointer;font-family:"Inter",sans-serif;transition:.15s;backdrop-filter:blur(4px)}
.nav-pill:hover{background:rgba(255,255,255,.3);color:#fff}
.nav-pill.active{background:#fff;color:var(--text);font-weight:600}

.main{flex:1;padding:1.5rem;max-width:1440px;width:100%;margin:0 auto}

/* PROJECTS */
.proj-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin-bottom:1.25rem}
.proj-card{background:var(--surface);border-radius:12px;border:1px solid var(--border);
  padding:16px 18px;position:relative;overflow:hidden;box-shadow:var(--shadow)}
.proj-card::before{content:"";position:absolute;inset:0 auto 0 0;width:4px}
.pc-sincro::before{background:var(--cyan2)}
.pc-cowork::before{background:var(--cowork)}
.proj-icon{font-size:20px;margin-bottom:6px}
.proj-name{font-size:14px;font-weight:600;color:var(--text)}
.proj-sub{font-size:11px;color:var(--text3);margin-top:1px}
.proj-nums{display:flex;gap:14px;margin-top:10px;flex-wrap:wrap}
.pnum{font-size:11px;color:var(--text2)}
.pnum strong{font-size:20px;font-weight:700;font-family:"Barlow Condensed",sans-serif;color:var(--text);display:block;line-height:1.1}
.proj-bar{height:3px;background:var(--border);border-radius:2px;margin-top:10px;overflow:hidden}
.pf-sincro{height:100%;background:linear-gradient(90deg,var(--cyan),var(--cyan2));transition:width .4s}
.pf-cowork{height:100%;background:linear-gradient(90deg,var(--cowork),#a78bfa);transition:width .4s}

/* STATS */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:1.25rem}
.stat{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);padding:12px 16px;box-shadow:var(--shadow)}
.stat-n{font-family:"Barlow Condensed",sans-serif;font-size:28px;font-weight:700;line-height:1}
.stat-l{font-size:11px;color:var(--text3);margin-top:2px}

/* FILTERS */
.filter-bar{display:flex;gap:6px;margin-bottom:1rem;flex-wrap:wrap;align-items:center}
.flabel{font-size:11px;color:var(--text3);font-weight:500}
.fchip{font-size:12px;padding:4px 12px;border-radius:20px;border:1px solid var(--border);
  background:var(--surface);color:var(--text2);cursor:pointer;font-family:"Inter",sans-serif;transition:.1s}
.fchip:hover{border-color:var(--cyan2);color:var(--cyan)}
.fchip.on{background:var(--cyan-bg);color:var(--cyan);border-color:var(--cyan-border);font-weight:500}

/* BOARD */
.board{display:grid;grid-template-columns:repeat(auto-fit,minmax(215px,1fr));gap:12px}
.col{background:var(--surface2);border-radius:12px;border:1px solid var(--border);overflow:hidden;display:flex;flex-direction:column}
.col-head{padding:10px 14px 9px;display:flex;align-items:center;justify-content:space-between;background:var(--surface);border-bottom:1px solid var(--border)}
.col-label{font-family:"Barlow Condensed",sans-serif;font-size:13px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;display:flex;align-items:center;gap:7px}
.col-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.col-cnt{font-size:11px;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:1px 8px;color:var(--text2)}
.col-prog{height:2px;background:var(--border)}
.col-pfill{height:100%;transition:width .3s}
.tasks-list{padding:7px;display:flex;flex-direction:column;gap:5px;flex:1}
.empty-col{font-size:12px;color:var(--text3);text-align:center;padding:20px;font-style:italic}
.add-zone{padding:0 7px 7px}
.add-task-btn{width:100%;font-size:12px;padding:7px;border:1.5px dashed var(--border);
  border-radius:var(--radius);background:transparent;color:var(--text3);cursor:pointer;
  font-family:"Inter",sans-serif;transition:.15s;display:flex;align-items:center;justify-content:center;gap:4px}
.add-task-btn:hover{border-color:var(--cyan-border);color:var(--cyan);background:var(--cyan-bg)}

/* TASK CARD */
.tcard{background:var(--surface);border:1px solid var(--border);border-radius:9px;overflow:hidden;box-shadow:var(--shadow);transition:border-color .15s}
.tcard:hover{border-color:var(--border2)}
.tcard.urgent{border-left:3px solid var(--red)}
.tcard-accent{height:2px}
.tbody{padding:10px 12px}
.ttitle{font-size:13px;font-weight:500;line-height:1.4;color:var(--text);margin-bottom:4px}
.tnote{font-size:11px;color:var(--text2);line-height:1.4;margin-bottom:5px}
.tchips{display:flex;gap:4px;flex-wrap:wrap;align-items:center;margin-bottom:7px}
.chip{font-size:10px;padding:2px 7px;border-radius:5px;font-weight:600}
.ch-alta{background:#fffbeb;color:var(--amber);border:1px solid #fde68a}
.ch-media{background:#eff6ff;color:#2563eb;border:1px solid #bfdbfe}
.ch-baja{background:var(--green-bg);color:var(--green);border:1px solid #bbf7d0}
.ch-hoy{background:var(--red-bg);color:var(--red);border:1px solid #fecaca}
.ch-cat{font-size:10px;padding:2px 7px;border-radius:5px;font-weight:500}
.ch-date{font-size:10px;color:var(--cyan)}
.ch-check{font-size:10px;color:var(--text3)}
.tfooter{display:flex;align-items:center;justify-content:space-between;gap:4px;flex-wrap:wrap}
.move-btns{display:flex;gap:3px;flex-wrap:wrap}
.mbtn{font-size:10px;padding:2px 7px;border:1px solid var(--border);border-radius:4px;background:transparent;color:var(--text2);cursor:pointer;font-family:"Inter",sans-serif;transition:.1s}
.mbtn:hover{background:var(--cyan-bg);border-color:var(--cyan-border);color:var(--cyan)}
.tctrl{display:flex;gap:3px;align-items:center}
.icbtn{width:24px;height:24px;border:1px solid var(--border);border-radius:5px;background:transparent;color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;transition:.1s}
.icbtn:hover{background:var(--bg)}
.icbtn.del:hover{background:var(--red-bg);color:var(--red);border-color:#fecaca}
.expbtn{font-size:10px;padding:3px 9px;border:1px solid var(--border);border-radius:5px;background:transparent;color:var(--text2);cursor:pointer;font-family:"Inter",sans-serif;display:flex;align-items:center;gap:3px;white-space:nowrap;transition:.1s}
.expbtn:hover{background:var(--bg)}
.expbtn.open{background:var(--cyan-bg);color:var(--cyan);border-color:var(--cyan-border)}
.arrow{display:inline-block;transition:transform .2s;font-size:8px}
.expbtn.open .arrow{transform:rotate(180deg)}
.tdetail{border-top:1px solid var(--border);background:var(--surface2)}
.dtabs{display:flex;background:var(--surface);border-bottom:1px solid var(--border);overflow-x:auto}
.dtab{font-size:11px;padding:8px 12px;cursor:pointer;color:var(--text2);border:none;background:transparent;border-bottom:2px solid transparent;font-family:"Inter",sans-serif;white-space:nowrap;transition:.1s}
.dtab:hover{color:var(--text)}
.dtab.on{color:var(--cyan);border-bottom-color:var(--cyan);font-weight:600}
.dpanel{padding:12px;display:none}
.dpanel.on{display:block}
.dlabel{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px}
.dta{width:100%;font-family:"Inter",sans-serif;font-size:12px;padding:8px 10px;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface);color:var(--text);resize:vertical;min-height:80px;line-height:1.6;outline:none}
.dta:focus{border-color:var(--cyan2)}
.sbtn{font-size:11px;padding:5px 14px;border-radius:7px;background:var(--cyan);color:#fff;border:none;cursor:pointer;margin-top:7px;font-family:"Inter",sans-serif;font-weight:600}
.sbtn:hover{background:var(--cyan2)}
.cli{display:flex;align-items:center;gap:7px;padding:5px 0;border-bottom:1px solid var(--border)}
.cli:last-child{border:none}
.cli input[type=checkbox]{width:14px;height:14px;cursor:pointer;accent-color:var(--cyan)}
.cli-text{font-size:12px;color:var(--text);flex:1}
.cli-text.done{text-decoration:line-through;color:var(--text3)}
.cli-del{font-size:10px;color:var(--text3);cursor:pointer;padding:0 3px;opacity:0;background:none;border:none}
.cli:hover .cli-del{opacity:1}
.cli-del:hover{color:var(--red)}
.addrow{display:flex;gap:6px;margin-top:8px}
.addinp{flex:1;font-family:"Inter",sans-serif;font-size:12px;padding:6px 10px;border:1px solid var(--border);border-radius:7px;background:var(--surface);color:var(--text);outline:none}
.addinp:focus{border-color:var(--cyan2)}
.addbtn{font-size:11px;padding:6px 12px;border:1px solid var(--border);border-radius:7px;background:var(--surface);color:var(--text2);cursor:pointer;font-family:"Inter",sans-serif;white-space:nowrap}
.addbtn:hover{background:var(--cyan-bg);border-color:var(--cyan-border);color:var(--cyan)}
.info-block{margin-bottom:12px}
.dinput{width:100%;font-family:"Inter",sans-serif;font-size:12px;padding:6px 10px;border:1px solid var(--border);border-radius:7px;background:var(--surface);color:var(--text);outline:none}
.dinput:focus{border-color:var(--cyan2)}
.lnkitem{display:flex;align-items:center;gap:6px;padding:5px 0;border-bottom:1px solid var(--border);font-size:12px}
.lnkitem:last-child{border:none}
.lnkitem a{color:var(--cyan);text-decoration:none;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.lnkitem a:hover{text-decoration:underline}
.ldel{font-size:10px;color:var(--text3);cursor:pointer;opacity:0;background:none;border:none}
.lnkitem:hover .ldel{opacity:1}
.ldel:hover{color:var(--red)}
.vitem{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:9px 11px;margin-bottom:6px;display:flex;gap:9px}
.vitem-main{flex:1}
.vname{font-size:12px;font-weight:500}
.vmeta{display:flex;gap:8px;margin-top:3px;flex-wrap:wrap;align-items:center}
.vprice{font-size:12px;color:var(--green);font-weight:600}
.vstate{font-size:10px;padding:1px 6px;border-radius:4px;font-weight:600}
.vs-disponible{background:var(--green-bg);color:var(--green)}
.vs-reservado{background:var(--amber-bg);color:var(--amber)}
.vs-vendido{background:var(--border);color:var(--text3)}
.vnote{font-size:11px;color:var(--text2);margin-top:2px}
.vdel{font-size:10px;color:var(--text3);cursor:pointer;opacity:0;background:none;border:none;padding:2px}
.vitem:hover .vdel{opacity:1}
.vdel:hover{color:var(--red)}
.vtotal{font-size:13px;font-weight:700;color:var(--green);padding:8px 12px;background:var(--green-bg);border-radius:8px;border:1px solid #bbf7d0;margin-bottom:9px}
.vadd-form{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px;margin-top:8px}
.vadd-row{display:flex;gap:6px;margin-bottom:6px;flex-wrap:wrap}
.vadd-inp{flex:1;min-width:90px;font-family:"Inter",sans-serif;font-size:12px;padding:6px 9px;border:1px solid var(--border);border-radius:7px;background:var(--bg);color:var(--text);outline:none}
.vadd-inp:focus{border-color:var(--cyan2)}
.vstate-sel{font-family:"Inter",sans-serif;font-size:10px;padding:2px 5px;border:1px solid var(--border);border-radius:4px;background:var(--surface);cursor:pointer}

/* CALENDAR */
.cal-layout{display:grid;grid-template-columns:1fr 260px;gap:14px;align-items:start}
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem}
.cal-title{font-family:"Barlow Condensed",sans-serif;font-size:22px;font-weight:700;letter-spacing:.5px;text-transform:uppercase}
.cal-nav{display:flex;gap:6px}
.cal-nav-btn{height:32px;padding:0 12px;border:1px solid var(--border);border-radius:8px;background:var(--surface);color:var(--text2);cursor:pointer;font-size:12px;font-family:"Inter",sans-serif;transition:.15s}
.cal-nav-btn:hover{background:var(--cyan-bg);border-color:var(--cyan-border);color:var(--cyan)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:1rem}
.cal-day-label{text-align:center;font-size:10px;font-weight:600;color:var(--text3);letter-spacing:.8px;text-transform:uppercase;padding:5px 0}
.cal-day{min-height:70px;background:var(--surface);border:1px solid var(--border);border-radius:7px;padding:5px;cursor:pointer;transition:.15s}
.cal-day:hover{border-color:var(--cyan-border);background:var(--cyan-bg)}
.cal-day.today{border-color:var(--cyan2);background:var(--cyan-bg)}
.cal-day.other-month{opacity:.4;background:var(--surface2)}
.cal-day.selected{border-color:var(--cyan);background:var(--cyan-bg)}
.cal-day-num{font-size:11px;font-weight:600;color:var(--text);margin-bottom:3px}
.cal-day.today .cal-day-num{color:var(--cyan);font-weight:700}
.cal-dot-wrap{display:flex;flex-direction:column;gap:2px}
.cal-dot{font-size:9px;padding:1px 4px;border-radius:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;line-height:1.4}
.cal-agenda{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px}
.cal-agenda-title{font-family:"Barlow Condensed",sans-serif;font-size:15px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;margin-bottom:10px}
.cal-agenda-item{display:flex;align-items:flex-start;gap:8px;padding:7px 0;border-bottom:1px solid var(--border)}
.cal-agenda-item:last-child{border:none}
.cal-agenda-date{font-size:11px;color:var(--cyan);font-weight:600;min-width:44px;margin-top:1px}
.cal-agenda-text{font-size:12px;color:var(--text);flex:1;line-height:1.4}
.cal-agenda-cat{font-size:10px;padding:1px 6px;border-radius:4px;margin-top:3px;display:inline-block;font-weight:500}
.cal-empty{font-size:12px;color:var(--text3);text-align:center;padding:14px;font-style:italic}

/* DATES IMPORTANTS */
.di-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px;box-shadow:var(--shadow);margin-bottom:10px}
.di-title{font-family:"Barlow Condensed",sans-serif;font-size:15px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.di-item{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border)}
.di-item:last-child{border:none}
.di-color{width:3px;height:32px;border-radius:2px;flex-shrink:0}
.di-main{flex:1}
.di-name{font-size:12px;font-weight:500;color:var(--text);line-height:1.3}
.di-date{font-size:10px;color:var(--cyan);font-weight:600;margin-top:1px}
.di-del{font-size:10px;color:var(--text3);cursor:pointer;opacity:0;background:none;border:none;padding:2px}
.di-item:hover .di-del{opacity:1}
.di-del:hover{color:var(--red)}
.di-countdown{font-size:10px;font-weight:600;padding:2px 7px;border-radius:10px;white-space:nowrap}
.di-countdown.proper{background:#fef3c7;color:#92400e}
.di-countdown.lluny{background:var(--green-bg);color:var(--green)}
.di-countdown.passat{background:var(--border);color:var(--text3)}
.di-add-form{margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
.di-inp{width:100%;font-family:"Inter",sans-serif;font-size:12px;padding:6px 9px;border:1px solid var(--border);border-radius:7px;background:var(--bg);color:var(--text);outline:none;margin-bottom:6px}
.di-inp:focus{border-color:var(--cyan2)}
.di-row{display:flex;gap:6px;margin-bottom:6px}
.di-add-btn{width:100%;font-size:11px;padding:7px;border-radius:7px;background:var(--cyan);color:#fff;border:none;cursor:pointer;font-family:"Inter",sans-serif;font-weight:600}
.di-add-btn:hover{background:var(--cyan2)}
.di-color-sel{flex:1;font-family:"Inter",sans-serif;font-size:11px;padding:6px 8px;border:1px solid var(--border);border-radius:7px;background:var(--bg);color:var(--text);outline:none}

/* VENDER */
.vtop-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:1.25rem}
.vender-view{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:12px}
.vender-col{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.vcol-head{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.vcol-title{font-family:"Barlow Condensed",sans-serif;font-size:15px;font-weight:700;letter-spacing:.5px;text-transform:uppercase}
.vcol-count{font-size:11px;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:1px 7px;color:var(--text2)}
.vcol-body{padding:10px}
.vcard{padding:9px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:6px}
.vcard-name{font-size:12px;font-weight:500}
.vcard-price{font-size:14px;font-weight:700;font-family:"Barlow Condensed",sans-serif;margin-top:2px}
.vcard-from{font-size:10px;color:var(--text3);margin-top:3px}
.vcard-note{font-size:11px;color:var(--text2);margin-top:2px}

/* MODAL */
.moverlay{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:100;backdrop-filter:blur(4px)}
.modal{background:var(--surface);border-radius:14px;border:1px solid var(--border);padding:1.5rem;width:min(430px,94vw);box-shadow:var(--shadow-md)}
.modal-title{font-family:"Barlow Condensed",sans-serif;font-size:20px;font-weight:700;margin-bottom:1.1rem}
.field{margin-bottom:10px}
.field label{font-size:11px;font-weight:600;color:var(--text2);display:block;margin-bottom:4px;letter-spacing:.3px;text-transform:uppercase}
.field input,.field textarea,.field select{width:100%;font-family:"Inter",sans-serif;font-size:13px;padding:8px 11px;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg);color:var(--text);outline:none;transition:.15s}
.field input:focus,.field textarea:focus,.field select:focus{border-color:var(--cyan2);background:var(--surface)}
.field textarea{height:66px;resize:vertical;line-height:1.5}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.mactions{display:flex;justify-content:flex-end;gap:8px;margin-top:1.1rem}
.btn-sec{padding:8px 16px;border:1px solid var(--border);border-radius:var(--radius);background:transparent;color:var(--text2);cursor:pointer;font-size:13px;font-family:"Inter",sans-serif}
.btn-sec:hover{background:var(--bg)}
.btn-pri{padding:8px 18px;border:none;border-radius:var(--radius);background:var(--cyan);color:#fff;cursor:pointer;font-size:13px;font-family:"Inter",sans-serif;font-weight:700}
.btn-pri:hover{background:var(--cyan2)}
.reminder-modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(4px)}
.reminder-modal{background:var(--surface);border-radius:14px;border:1px solid var(--border);padding:1.5rem;width:min(380px,94vw);box-shadow:var(--shadow-md)}
.reminder-modal h3{font-family:"Barlow Condensed",sans-serif;font-size:20px;font-weight:700;margin-bottom:1rem}
.reminder-list{margin-bottom:8px}
.reminder-item{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border);font-size:12px;color:var(--text)}
.reminder-item:last-child{border:none}
.reminder-item-del{background:none;border:none;color:var(--text3);cursor:pointer;font-size:11px;margin-left:auto}
.reminder-item-del:hover{color:var(--red)}
.radd-row{display:flex;gap:6px;margin-top:8px}
.radd-inp{flex:1;font-family:"Inter",sans-serif;font-size:12px;padding:7px 10px;border:1px solid var(--border);border-radius:8px;background:var(--bg);color:var(--text);outline:none}
.radd-inp:focus{border-color:var(--cyan2)}
.radd-btn{font-size:11px;padding:7px 12px;border-radius:8px;background:var(--cyan);color:#fff;border:none;cursor:pointer;font-family:"Inter",sans-serif;font-weight:600}
.radd-btn:hover{background:var(--cyan2)}
.rclose-btn{width:100%;margin-top:10px;font-size:12px;padding:7px;border:1px solid var(--border);border-radius:8px;background:transparent;color:var(--text2);cursor:pointer;font-family:"Inter",sans-serif}
.rclose-btn:hover{background:var(--bg)}
.toast{position:fixed;bottom:24px;right:24px;background:var(--text);color:#fff;font-size:12px;font-weight:500;padding:10px 18px;border-radius:10px;z-index:300;opacity:0;transition:opacity .2s;pointer-events:none}
.toast.show{opacity:1}
@media(max-width:768px){.cal-layout{grid-template-columns:1fr}}
@media(max-width:640px){.header{height:90px}.main{padding:1rem}.stats-row,.vtop-stats{grid-template-columns:repeat(2,1fr)}.board{grid-template-columns:1fr}.nav-pill{font-size:11px;padding:6px 10px}.cal-day{min-height:52px;padding:4px}.cal-dot{display:none}}

  var h='<div class="tdetail"><div class="dtabs">'+tabs.map(function(p){return '<button class="dtab'+(tab===p[0]?" on":"")+'" onclick="switchTab(''+t.id+'',''+p[0]+'')">'+p[1]+"</button>";}).join("")+"</div>";
  h+='<div class="dpanel'+(tab==="notas"?" on":"")+'"><div class="dlabel">Notes ampliades</div><textarea class="dta" id="dtext-'+t.id+'" placeholder="Context, idees...">'+esc(t.detail||"")+'</textarea><button class="sbtn" onclick="saveDetail(''+t.id+'')">Guardar</button></div>';
  h+='<div class="dpanel'+(tab==="checklist"?" on":"")+'">'+( cl.length?cl.map(function(item,i){return '<div class="cli"><input type="checkbox"'+(item.done?" checked":"")+" onchange="toggleCheck('"+t.id+"',"+i+")"><span class="cli-text"+(item.done?" done":"")+"">"+esc(item.text)+'</span><button class="cli-del" onclick="delCheck(''+t.id+"',"+i+')">✕</button></div>';}).join(""):'<div style="font-size:12px;color:#9aa5b4;padding:6px 0">Sense passos encara</div>')+'<div class="addrow"><input class="addinp" id="cl-'+t.id+'" placeholder="Nou pas..." onkeydown="if(event.key==='Enter')addCheck(''+t.id+'')"><button class="addbtn" onclick="addCheck(''+t.id+'')">+ Afegir</button></div></div>';
  h+='<div class="dpanel'+(tab==="info"?" on":"")+'"><div class="info-block"><div class="dlabel">Data limit</div><input class="dinput" type="date" id="dfecha-'+t.id+'" value="'+esc(t.fecha||"")+'"></div><div class="info-block"><div class="dlabel">Enllaç</div><div class="addrow"><input class="addinp" id="dlink-'+t.id+'" placeholder="https://..."><button class="addbtn" onclick="addLink(''+t.id+'')">+ Afegir</button></div>'+((t.links&&t.links.length)?t.links.map(function(l,i){return '<div class="lnkitem"><a href="'+esc(l)+'" target="_blank">'+esc(l)+'</a><button class="ldel" onclick="delLink(''+t.id+"',"+i+')">✕</button></div>';}).join(""):"")+'</div><button class="sbtn" onclick="saveMeta(''+t.id+'')">Guardar</button></div>';
  h+='<div class="dpanel'+(tab==="vender"?" on":"")+'">'+( vl.length?'<div class="vtotal">Venut: '+vT.toFixed(2)+" €</div>":"")+vl.map(function(v,i){return '<div class="vitem"><div class="vitem-main"><div class="vname">'+esc(v.name)+'</div><div class="vmeta">'+(v.price?'<span class="vprice">'+parseFloat(v.price).toFixed(2)+" €</span>":"")+'<span class="vstate vs-'+v.state+'">'+v.state+"</span></div>"+(v.note?'<div class="vnote">'+esc(v.note)+"</div>":"")+'</div><div style="display:flex;flex-direction:column;gap:4px;align-items:flex-end"><select class="vstate-sel" onchange="changeVS(''+t.id+"',"+i+",this.value)">"+["disponible","reservado","vendido"].map(function(s){return "<option"+(v.state===s?" selected":"")+">"+s+"</option>";}).join("")+'</select><button class="vdel" onclick="delVender(''+t.id+"',"+i+')">✕</button></div></div>';}).join("")+'<div class="vadd-form"><div class="dlabel" style="margin-bottom:8px">Afegir article</div><div class="vadd-row"><input class="vadd-inp" id="vname-'+t.id+'" placeholder="Nom"><input class="vadd-inp" id="vprice-'+t.id+'" placeholder="Preu" type="number" style="max-width:80px"></div><input class="vadd-inp" id="vnote-'+t.id+'" placeholder="Nota..." style="width:100%;margin-bottom:7px"><button class="sbtn" onclick="addVender(''+t.id+'')">+ Afegir</button></div></div>';
  h+="</div>";return h;
}

function renderCalendar(){
  var MN=["Gener","Febrer","Marc","Abril","Maig","Juny","Juliol","Agost","Setembre","Octubre","Novembre","Desembre"];
  var DN=["Dl","Dt","Dc","Dj","Dv","Ds","Dg"];
  var today=new Date();var y=calYear,m=calMonth;
  var first=new Date(y,m,1);var last=new Date(y,m+1,0);
  var off=first.getDay();off=(off===0)?6:off-1;
  var cells=[];
  for(var i=0;i<off;i++){cells.push({d:new Date(y,m,1-off+i),cur:false});}
  for(var i=1;i<=last.getDate();i++){cells.push({d:new Date(y,m,i),cur:true});}
  while(cells.length%7!==0){var ld=cells[cells.length-1].d;var nd=new Date(ld);nd.setDate(nd.getDate()+1);cells.push({d:nd,cur:false});}
  function dk(d){return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}
  var tbd={};tasks.forEach(function(t){if(t.fecha){if(!tbd[t.fecha])tbd[t.fecha]=[];tbd[t.fecha].push(t);}});
  var dbd={};datesImportants.forEach(function(di){if(di.date){if(!dbd[di.date])dbd[di.date]=[];dbd[di.date].push(di);}});
  var tk=dk(today);var sk=calSelected?dk(calSelected):null;
  var grid='<div class="cal-grid">'+DN.map(function(d){return '<div class="cal-day-label">'+d+"</div>";}).join("");
  cells.forEach(function(cell){
    var k=dk(cell.d);
    var cls="cal-day"+(cell.cur?"":"-other")+(k===tk?" today":"")+(k===sk?" selected":"");
    if(!cell.cur)cls="cal-day other-month"+(k===tk?" today":"")+(k===sk?" selected":"");
    else cls="cal-day"+(k===tk?" today":"")+(k===sk?" selected":"");
    var dt=tbd[k]||[];var dd=dbd[k]||[];var rems=calReminders[k]||[];
    var dots='<div class="cal-dot-wrap">';
    dd.forEach(function(di){dots+='<div class="cal-dot" style="background:'+di.color+';color:#fff;font-weight:600">⭐ '+esc(di.name.substring(0,10))+"</div>";});
    dt.forEach(function(t){var c=CATS[t.cat]||CATS.personal;dots+='<div class="cal-dot" style="background:'+c.color+';color:#fff">'+c.icon+" "+esc(t.title.substring(0,9))+"</div>";});
    rems.forEach(function(r){dots+='<div class="cal-dot" style="background:#fef3c7;color:#92400e">'+esc(r.substring(0,10))+"</div>";});
    dots+="</div>";
    grid+='<div class="'+cls+'" onclick="selDay(new Date('+cell.d.getFullYear()+","+cell.d.getMonth()+","+cell.d.getDate()+'))"><div class="cal-day-num">'+cell.d.getDate()+"</div>"+dots+"</div>";
  });
  grid+="</div>";
  var ms=y+"-"+String(m+1).padStart(2,"0");
  var items=[];
  Object.keys(tbd).forEach(function(k){if(k.startsWith(ms))tbd[k].forEach(function(t){items.push({k:k,type:"task",t:t});});});
  Object.keys(dbd).forEach(function(k){if(k.startsWith(ms))dbd[k].forEach(function(di){items.push({k:k,type:"di",di:di});});});
  Object.keys(calReminders).forEach(function(k){if(k.startsWith(ms))(calReminders[k]||[]).forEach(function(r){items.push({k:k,type:"rem",text:r});});});
  items.sort(function(a,b){return a.k.localeCompare(b.k);});
  var ag='<div class="cal-agenda"><div class="cal-agenda-title">Agenda - '+MN[m]+" "+y+"</div>";
  if(items.length){items.forEach(function(item){var p=item.k.split("-");var ds=p[2]+"/"+p[1];if(item.type==="task"){var c=CATS[item.t.cat]||CATS.personal;ag+='<div class="cal-agenda-item"><div class="cal-agenda-date">'+ds+'</div><div><div class="cal-agenda-text">'+esc(item.t.title)+'</div><span class="cal-agenda-cat" style="background:'+c.bg+";color:"+c.color+'">'+c.icon+" "+c.label+"</span></div></div>";}else if(item.type==="di"){ag+='<div class="cal-agenda-item"><div class="cal-agenda-date">'+ds+'</div><div><div class="cal-agenda-text">⭐ '+esc(item.di.name)+'</div><span class="cal-agenda-cat" style="background:'+item.di.color+'22;color:'+item.di.color+'">Data important</span></div></div>';}else{ag+='<div class="cal-agenda-item"><div class="cal-agenda-date">'+ds+'</div><div><div class="cal-agenda-text">📌 '+esc(item.text)+"</div></div></div>";}});}
  else{ag+='<div class="cal-empty">Sense dates aquest mes</div>';}
  ag+="</div>";
  var today2=new Date();today2.setHours(0,0,0,0);
  var diS='<div class="di-card"><div class="di-title">⭐ Dates Importants</div>';
  var sorted=datesImportants.slice().sort(function(a,b){return a.date.localeCompare(b.date);});
  sorted.forEach(function(di){
    var p=di.date.split("-");var diD=new Date(parseInt(p[0]),parseInt(p[1])-1,parseInt(p[2]));
    var diff=Math.round((diD-today2)/(1000*60*60*24));
    var cls2=diff<0?"passat":diff<=30?"proper":"lluny";
    var txt=diff<0?"Passat":diff===0?"Avui!":diff===1?"Dema":diff+"d";
    diS+='<div class="di-item"><div class="di-color" style="background:'+di.color+'"></div><div class="di-main"><div class="di-name">'+esc(di.name)+'</div><div class="di-date">'+p[2]+"/"+p[1]+"/"+p[0]+'</div></div><span class="di-countdown '+cls2+'">'+txt+'</span><button class="di-del" onclick="delDI(''+di.id+'')">✕</button></div>';
  });
  diS+='<div class="di-add-form"><div class="dlabel" style="margin-bottom:8px">Afegir data important</div><input class="di-inp" id="di-name" placeholder="Nom de l event"><div class="di-row"><input class="di-inp" type="date" id="di-date" style="flex:1;margin-bottom:0"><select class="di-color-sel" id="di-color"><option value="#0090b8">Blau</option><option value="#16a34a">Verd</option><option value="#d97706">Groc</option><option value="#e53e3e">Vermell</option><option value="#9333ea">Lila</option></select></div><button class="di-add-btn" onclick="addDI()">+ Afegir</button></div></div>';
  var remS='<div class="di-card"><div class="di-title">📌 Recordatoris</div>';
  var allR=[];Object.keys(calReminders).forEach(function(k){(calReminders[k]||[]).forEach(function(r){allR.push({k:k,text:r});});});
  allR.sort(function(a,b){return a.k.localeCompare(b.k);});
  function dk2(d){return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}
  var fut=allR.filter(function(r){return r.k>=dk2(today);}).slice(0,5);
  if(fut.length){fut.forEach(function(r){var p=r.k.split("-");remS+='<div class="di-item"><div class="di-main"><div class="di-name">'+esc(r.text)+'</div><div class="di-date">'+p[2]+"/"+p[1]+"/"+p[0]+"</div></div></div>";});}
  else{remS+='<div class="cal-empty">Sense recordatoris</div>';}
  remS+="</div>";
  document.getElementById("root").innerHTML='<div class="cal-layout"><div class="cal-main"><div class="cal-header"><div class="cal-title">'+MN[m]+" "+y+'</div><div class="cal-nav"><button class="cal-nav-btn" onclick="calPrev()">◀</button><button class="cal-nav-btn" onclick="calToday()">Avui</button><button class="cal-nav-btn" onclick="calNext()">▶</button></div></div>'+grid+ag+'</div><div class="cal-sidebar">'+diS+remS+'</div></div>';
}
function calPrev(){calMonth--;if(calMonth<0){calMonth=11;calYear--;}render();}
function calNext(){calMonth++;if(calMonth>11){calMonth=0;calYear++;}render();}
function calToday(){var t=new Date();calYear=t.getFullYear();calMonth=t.getMonth();render();}
function addDI(){var n=document.getElementById("di-name");var d=document.getElementById("di-date");var c=document.getElementById("di-color");if(!n||!d||!n.value.trim()||!d.value)return;datesImportants.push({id:uid(),name:n.value.trim(),date:d.value,color:c.value});saveLocal();render();showToast("Data important afegida");}
function delDI(id){datesImportants=datesImportants.filter(function(d){return d.id!==id;});saveLocal();render();}
function selDay(date){
  calSelected=date;render();
  var MN=["Gener","Febrer","Marc","Abril","Maig","Juny","Juliol","Agost","Setembre","Octubre","Novembre","Desembre"];
  function dk(d){return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}
  var k=dk(date);var rems=calReminders[k]||[];
  var tDay=tasks.filter(function(t){return t.fecha===k;});
  var diDay=datesImportants.filter(function(di){return di.date===k;});
  var modal=document.createElement("div");modal.className="reminder-modal-bg";modal.id="rem-modal";
  var tH=tDay.length?"<div class='dlabel' style='margin-bottom:6px'>Tasques</div><div class='reminder-list'>"+tDay.map(function(t){var c=CATS[t.cat]||CATS.personal;return "<div class='reminder-item'>"+c.icon+" "+esc(t.title)+"</div>";}).join("")+"</div>":"";
  var dH=diDay.length?"<div class='dlabel' style='margin-bottom:6px;margin-top:8px'>Dates importants</div><div class='reminder-list'>"+diDay.map(function(di){return "<div class='reminder-item' style='color:"+di.color+";font-weight:600'>⭐ "+esc(di.name)+"</div>";}).join("")+"</div>":"";
  var rH=rems.length?"<div class='dlabel' style='margin-bottom:6px;margin-top:8px'>Recordatoris</div><div class='reminder-list'>"+rems.map(function(r,i){return "<div class='reminder-item'>📌 "+esc(r)+'<button class="reminder-item-del" onclick="delRem(''+k+"',"+i+')">✕</button></div>';}).join("")+"</div>":"";
  modal.innerHTML="<div class='reminder-modal'><h3>"+date.getDate()+" "+MN[date.getMonth()]+" "+date.getFullYear()+"</h3>"+tH+dH+rH+"<div class='dlabel' style='margin-top:12px;margin-bottom:6px'>Afegir recordatori</div><div class='radd-row'><input class='radd-inp' id='rem-inp' placeholder='Escriu un recordatori...' onkeydown="if(event.key==='Enter')addRem('"+k+"')"><button class='radd-btn' onclick="addRem('"+k+"')">+ Afegir</button></div><button class='rclose-btn' onclick='closeRem()'>Tancar</button></div>";
  document.body.appendChild(modal);modal.addEventListener("click",function(e){if(e.target===modal)closeRem();});
  setTimeout(function(){var i=document.getElementById("rem-inp");if(i)i.focus();},50);
}
function closeRem(){var m=document.getElementById("rem-modal");if(m)m.remove();}
function addRem(k){var i=document.getElementById("rem-inp");var t=i?i.value.trim():"";if(!t)return;if(!calReminders[k])calReminders[k]=[];calReminders[k].push(t);saveLocal();closeRem();render();showToast("Recordatori afegit");}
function delRem(k,i){if(calReminders[k]){calReminders[k].splice(i,1);if(!calReminders[k].length)delete calReminders[k];}saveLocal();closeRem();render();}

function renderVender(){
  var all=[];tasks.forEach(function(t){(t.vender||[]).forEach(function(v){all.push(Object.assign({},v,{tt:t.title,tc:t.cat}));});});
  var tv=all.filter(function(v){return v.state==="vendido";}).reduce(function(a,v){return a+(parseFloat(v.price)||0);},0);
  var td=all.filter(function(v){return v.state==="disponible";}).reduce(function(a,v){return a+(parseFloat(v.price)||0);},0);
  var nr=all.filter(function(v){return v.state==="reservado";}).length;
  var h='<div class="vtop-stats"><div class="stat"><div class="stat-n">'+all.length+'</div><div class="stat-l">Articles</div></div><div class="stat"><div class="stat-n" style="color:#16a34a">'+tv.toFixed(0)+' €</div><div class="stat-l">Venut</div></div><div class="stat"><div class="stat-n" style="color:#3b82f6">'+td.toFixed(0)+' €</div><div class="stat-l">Disponible</div></div><div class="stat"><div class="stat-n" style="color:#d97706">'+nr+'</div><div class="stat-l">Reservats</div></div></div>';
  h+='<div class="vender-view">'+[{id:"disponible",label:"Disponible",color:"#16a34a"},{id:"reservado",label:"Reservat",color:"#d97706"},{id:"vendido",label:"Venut",color:"#6b7280"}].map(function(sc){var its=all.filter(function(v){return v.state===sc.id;});return '<div class="vender-col"><div class="vcol-head"><span class="vcol-title" style="color:'+sc.color+'">'+sc.label+'</span><span class="vcol-count">'+its.length+'</span></div><div class="vcol-body">'+(its.length?its.map(function(v){var c=CATS[v.tc]||CATS.personal;return '<div class="vcard"><div class="vcard-name">'+esc(v.name)+'</div>'+(v.price?'<div class="vcard-price" style="color:'+sc.color+'">'+parseFloat(v.price).toFixed(2)+' €</div>':'')+'<div class="vcard-from">'+c.icon+" "+esc(v.tt)+"</div>"+(v.note?'<div class="vcard-note">'+esc(v.note)+"</div>":"")+"</div>";}).join(""):'<div style="font-size:12px;color:#9aa5b4;text-align:center;padding:16px">Sense articles</div>')+"</div></div>";}).join("")+"</div>";
  document.getElementById("root").innerHTML=h;
}

function setFilter(c){filterCat=c;render();}
function toggleDetail(id){openDetail[id]=!openDetail[id];if(!openTab[id])openTab[id]="notas";render();}
function switchTab(id,tab){openTab[id]=tab;render();}
async function saveDetail(id){var t=tasks.find(function(x){return x.id===id;});var el=document.getElementById("dtext-"+id);if(t&&el){t.detail=el.value;await upsertTask(t);render();showToast("Guardat");}}
async function saveMeta(id){var t=tasks.find(function(x){return x.id===id;});var el=document.getElementById("dfecha-"+id);if(t&&el){t.fecha=el.value;await upsertTask(t);render();showToast("Guardat");}}
async function toggleCheck(id,i){var t=tasks.find(function(x){return x.id===id;});if(t&&t.checklist[i]){t.checklist[i].done=!t.checklist[i].done;await upsertTask(t);render();}}
async function delCheck(id,i){var t=tasks.find(function(x){return x.id===id;});if(t){t.checklist.splice(i,1);await upsertTask(t);render();}}
async function addCheck(id){var inp=document.getElementById("cl-"+id);var text=inp?inp.value.trim():"";if(!text)return;var t=tasks.find(function(x){return x.id===id;});if(t){if(!t.checklist)t.checklist=[];t.checklist.push({text:text,done:false});await upsertTask(t);render();}}
async function addLink(id){var inp=document.getElementById("dlink-"+id);var url=inp?inp.value.trim():"";if(!url)return;if(url.indexOf("http")!==0)url="https://"+url;var t=tasks.find(function(x){return x.id===id;});if(t){if(!t.links)t.links=[];t.links.push(url);await upsertTask(t);render();}}
async function delLink(id,i){var t=tasks.find(function(x){return x.id===id;});if(t){t.links.splice(i,1);await upsertTask(t);render();}}
async function addVender(id){var n=document.getElementById("vname-"+id);var p=document.getElementById("vprice-"+id);var no=document.getElementById("vnote-"+id);var name=n?n.value.trim():"";if(!name)return;var t=tasks.find(function(x){return x.id===id;});if(t){if(!t.vender)t.vender=[];t.vender.push({name:name,price:p?p.value:"",note:no?no.value.trim():"",state:"disponible"});await upsertTask(t);render();}}
async function delVender(id,i){var t=tasks.find(function(x){return x.id===id;});if(t){t.vender.splice(i,1);await upsertTask(t);render();}}
async function changeVS(id,i,state){var t=tasks.find(function(x){return x.id===id;});if(t&&t.vender[i]){t.vender[i].state=state;await upsertTask(t);render();}}
async function moveTask(id,col){var t=tasks.find(function(x){return x.id===id;});if(t){t.col=col;await upsertTask(t);render();showToast("Mogut");}}
function editTask(id){openModal(id,null);}
async function delTask(id){if(!confirm("Eliminar aquesta tasca?"))return;tasks=tasks.filter(function(x){return x.id!==id;});delete openDetail[id];await removeTask(id);render();showToast("Eliminada");}
function openModal(id,col){
  editId=id;addToCol=col;
  document.getElementById("mtitle").textContent=id?"Editar tasca":"Nova tasca";
  if(id){var t=tasks.find(function(x){return x.id===id;});document.getElementById("f-title").value=t.title;document.getElementById("f-cat").value=t.cat;document.getElementById("f-prio").value=t.prio;document.getElementById("f-note").value=t.note||"";document.getElementById("f-hoy").value=t.hoy||"";}
  else{document.getElementById("f-title").value="";document.getElementById("f-cat").value="sincro";document.getElementById("f-prio").value="media";document.getElementById("f-note").value="";document.getElementById("f-hoy").value="";}
  document.getElementById("modal").style.display="flex";
  setTimeout(function(){document.getElementById("f-title").focus();},60);
}
function closeModal(){document.getElementById("modal").style.display="none";editId=null;addToCol=null;}
async function saveTask(){
  var title=document.getElementById("f-title").value.trim();if(!title)return;
  var t;
  if(editId){t=tasks.find(function(x){return x.id===editId;});t.title=title;t.cat=document.getElementById("f-cat").value;t.prio=document.getElementById("f-prio").value;t.note=document.getElementById("f-note").value.trim();t.hoy=document.getElementById("f-hoy").value;}
  else{t={id:uid(),title:title,cat:document.getElementById("f-cat").value,prio:document.getElementById("f-prio").value,note:document.getElementById("f-note").value.trim(),col:addToCol||"pendiente",hoy:document.getElementById("f-hoy").value,detail:"",checklist:[],fecha:"",links:[],vender:[]};tasks.push(t);}
  closeModal();await upsertTask(t);render();showToast(editId?"Actualitzat":"Creat");
}
document.getElementById("modal").addEventListener("click",function(e){if(e.target===this)closeModal();});
document.addEventListener("keydown",function(e){if(e.key==="Escape")closeModal();});
loadLocal();loadData();
</script>
</body>
